<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useEffect,useRef,useCallback} = React;

const Icon = React.memo(({name,cls="w-3.5 h-3.5"})=>{
  useEffect(()=>{if(window.lucide)window.lucide.createIcons();},[name]);
  return <i data-lucide={name} className={cls}></i>;
});

// ─── Psychrometric Library ────────────────────────────────────────────────────
const Psy = {
  P: 101.325,
  getPsat(T){
    const K=T+273.15,C=T>=0?[-5.8002206e3,1.3914993,-4.8640239e-2,4.1764768e-5,-1.4452093e-8,6.5459673]:[-5.6745359e3,6.3925247,-9.677843e-3,6.2215701e-7,2.0747825e-9,-9.484024e-13,4.1635019];
    const lnP=T>=0?C[0]/K+C[1]+C[2]*K+C[3]*K*K+C[4]*K*K*K+C[5]*Math.log(K):C[0]/K+C[1]+C[2]*K+C[3]*K*K+C[4]*K*K*K+C[5]*K*K*K*K+C[6]*Math.log(K);
    return Math.exp(lnP)/1000;
  },
  byDBRH(db,rh){
    const rhClamped=Math.min(100,Math.max(0.01,rh||0.01));
    const psat=this.getPsat(db||0),pw=rhClamped/100*psat;
    const pw_safe=Math.max(1e-9,pw);
    const w=0.621945*pw_safe/(this.P-pw_safe),h=1.006*(db||0)+w*(2501+1.86*(db||0));
    const v=0.287042*((db||0)+273.15)*(1+1.6078*w)/this.P;
    const a=Math.log(pw_safe);
    const dp=6.54+14.526*a+0.7389*a*a+0.09486*Math.pow(a,3)+0.4569*Math.pow(pw_safe,0.1984);
    // --- WB: Bisection (bounded [dp,db]) — replaces unstable Newton which overshoots ---
    const hSat=(t)=>{const ps=this.getPsat(t),ws=0.621945*ps/(this.P-ps);return 1.006*t+ws*(2501+1.86*t);};
    let lo=Math.min(dp,(db||0)-60), hi=(db||0), wb=(db||0);
    if(hSat(lo)>h) lo=(db||0)-150; // extend lower bound for extreme dry conditions
    for(let i=0;i<60;i++){
      const mid=(lo+hi)/2;
      if(Math.abs(hi-lo)<0.001){wb=mid;break;}
      if(hSat(mid)<h) lo=mid; else hi=mid;
      wb=mid;
    }
    wb=Math.min((db||0),Math.max(dp,wb)); // physical clamp: dp ≤ WB ≤ DB
    return{db:(db||0),rh:Math.min(100,Math.max(0,rh||0)),w,h,v,dp,wb,pw:pw_safe,psat};
  },
  byDBW(db,w_in){
    const psat=this.getPsat(db),wsat=0.621945*psat/(this.P-psat);
    const w=Math.max(0,Math.min(w_in||0,wsat));
    const pw=w*this.P/(0.621945+w);
    const rh=Math.min(100,(pw/psat)*100);
    return this.byDBRH(db,rh);
  },
  mix(oa,ra,oaPct){
    const r=Math.max(0,Math.min(100,oaPct||0))/100;
    const hm=oa.h*r+ra.h*(1-r),wm=oa.w*r+ra.w*(1-r);
    let db=(hm-2501*wm)/(1.006+1.86*wm);
    if(!isFinite(db))db=oa.db;
    return this.byDBW(db,wm);
  },
  // ADP: apparatus dew point by extending process line to saturation curve
  calcADP(s1,s2){
    // Only meaningful when cooling + dehumidifying
    if(s2.db>=s1.db||s2.w>=s1.w)return null;
    const slope=(s2.w-s1.w)/(s2.db-s1.db);
    // Bisection: find db_adp where line(db) = w_sat(db)
    let lo=-5,hi=s2.db;
    for(let i=0;i<60;i++){
      const mid=(lo+hi)/2;
      const wLine=s2.w+slope*(mid-s2.db);
      const wSat=this.byDBRH(mid,100).w;
      if(wLine>wSat)lo=mid; else hi=mid;
    }
    let adpDB=(lo+hi)/2;
    if(adpDB <= -4.8){
      adpDB = Math.max(0.1, s2.dp - 1.0);
    }
    const adpState=this.byDBRH(adpDB,100);
    const BF=(s2.db-adpDB)/(s1.db-adpDB);
    return{db:adpDB,w:adpState.w,state:adpState,BF:Math.max(0,Math.min(1,BF))};
  },
  // WB temperature line: points with same WB temp
  wbLineW(db,Twb){
    const pswb=this.getPsat(Twb),wswb=0.621945*pswb/(this.P-pswb);
    return(wswb*(2501-2.381*Twb)-1.006*(db-Twb))/(2501+1.86*db-4.186*Twb);
  },
  // Enthalpy line: w given db and h
  enthLineW(db,h){return(h-1.006*db)/(2501+1.86*db);}
};

// Pipe size lookup based on ~1.5 m/s velocity
const getPipeSize=(lpm)=>{
  if(!lpm||lpm<=0)return"---";
  const v=Math.abs(lpm);
  if(v<=19.5)return"20A";if(v<=31)return"25A";if(v<=90)return"32A";
  if(v<=140)return"40A";if(v<=219)return"50A";if(v<=370)return"65A";
  if(v<=560)return"80A";if(v<=1020)return"100A";if(v<=1594)return"125A";
  if(v<=2295)return"150A";if(v<=4080)return"200A";if(v<=6375)return"250A";
  if(v<=9180)return"300A";return"350A+";
};

// ─── Cohen–Sutherland clipping ───────────────────────────────────────────────
const IN=0,L=1,R=2,B=4,T=8;
const code=(db,w,V)=>{let c=IN;if(db<V.dbMin)c|=L;else if(db>V.dbMax)c|=R;if(w<V.wMin)c|=B;else if(w>V.wMax)c|=T;return c;};
const clip=(p1,p2,V)=>{
  let x1=p1.db,y1=p1.w,x2=p2.db,y2=p2.w;
  if([x1,y1,x2,y2].some(isNaN))return null;
  if(Math.abs(x2-x1)<1e-9&&Math.abs(y2-y1)<1e-9)return null;
  let c1=code(x1,y1,V),c2=code(x2,y2,V);
  for(let i=0;i<12;i++){
    if(!(c1|c2))return{x1,y1,x2,y2};
    if(c1&c2)return null;
    const co=c1||c2;let x,y;
    if(co&T){x=x1+(x2-x1)*(V.wMax-.0001-y1)/(y2-y1);y=V.wMax-.0001;}
    else if(co&B){x=x1+(x2-x1)*(V.wMin+.0001-y1)/(y2-y1);y=V.wMin+.0001;}
    else if(co&R){y=y1+(y2-y1)*(V.dbMax-.0001-x1)/(x2-x1);x=V.dbMax-.0001;}
    else{y=y1+(y2-y1)*(V.dbMin+.0001-x1)/(x2-x1);x=V.dbMin+.0001;}
    if(isNaN(x)||isNaN(y))return null;
    if(co===c1){x1=x;y1=y;c1=code(x1,y1,V);}else{x2=x;y2=y;c2=code(x2,y2,V);}
  }
  return null;
};

// ─── Main App ─────────────────────────────────────────────────────────────────
const App=()=>{
  const urlP=new URLSearchParams(window.location.search);
  const [lang,setLang]=useState(urlP.get('lang')==='en'?'en':'zh');
  const [mode,setMode]=useState('MAU');
  const [sidebarOpen,setSidebarOpen]=useState(true);
  const [activeTab,setActiveTab]=useState('result'); // 'result' | 'states' | 'chart'
  const [airFlow,setAirFlow]=useState(35000);
  const [coilW,setCoilW]=useState(2400);
  const [coilH,setCoilH]=useState(1600);
  const [fanHeat,setFanHeat]=useState(0); // kW
  const [oa,setOa]=useState({db:35,rh:75});
  const [ra,setRa]=useState({db:26,rh:50});
  const [room,setRoom]=useState({db:23,rh:50});
  const [roomTol,setRoomTol]=useState({db:1,rh:5});
  const [mixRatio,setMixRatio]=useState(30);
  const [waterConfig,setWaterConfig]=useState({
    CHW_L:{in:7,out:12.5},CHW_M:{in:12,out:18},HW:{in:60,out:50},WW:{in:25,out:25}
  });
  const [hoveredPoint,setHoveredPoint]=useState(null);
  const [dragIdx,setDragIdx]=useState(null);
  const [showEnthLines,setShowEnthLines]=useState(true);
  const [showWBLines,setShowWBLines]=useState(true);

  const zh={
    mode_mau:"MAU 模式",mode_ahu:"AHU 模式",
    title:"PsychroSolver Pro",subtitle:"Final Audit v9.0",
    tab_result:"核算結果",tab_states:"狀態點明細",tab_chart:"圖表設定",
    sys_flow:"系統風量 (CMH)",width:"寬 (mm)",height:"高 (mm)",
    fan_heat:"風機加熱 (kW)",fan_heat_tip:"離心風機效率損失轉熱能，大型系統不可忽略",
    oa_cond:"OA 外氣條件",ra_cond:"RA 回風 & 混風比",oa_ratio:"外氣比 OA %",
    target:"目標範圍設計",coil_seq:"盤管處理序列",
    hw:"熱水 (HW)",chw_m:"中溫冰水 (CHW-M)",chw_l:"低溫冰水 (CHW-L)",ww:"水洗 (WW)",
    cf:"接觸因子 %",outlet_db:"出口 DB",outlet_rh:"出口 RH",
    audit:"空調設計核算總表",cycle:"Audit Report Cycle:",active:"active",
    condensate:"總除濕量",print:"列印 PDF",excel:"匯出 EXCEL",
    tin:"Tin",tout:"Tout",new_stage:"新階段",
    col_coil:"盤管組件",col_outlet:"出口條件",col_load:"負荷(kW)",col_rt:"RT",
    col_shr:"SHR",col_sh:"顯熱kW",col_lh:"潛熱kW",col_adp:"ADP / BF",
    col_flow:"流量(LPM)",col_vel:"風速(m/s)",col_spec:"估計行程",col_pipe:"建議管徑",
    // States table
    st_point:"狀態點",st_db:"DB(°C)",st_wb:"WB(°C)",st_dp:"DP(°C)",
    st_rh:"RH(%)",st_w:"W(g/kg)",st_h:"h(kJ/kg)",st_v:"v(m³/kg)",
    // Chart
    show_enth:"顯示等焓線",show_wb:"顯示等濕球線",
    c1:"1.預熱(Pre-Heat)",c2:"2.預冷(Pre-Cool)",c3:"3.水洗(Water Wash)",
    c4:"4.除濕(Dehumidifier)",c5:"5.再熱(Re-Heat)",
    w_hw:"熱水段",w_ww:"水洗段",w_chw_l:"低溫冰水",w_chw_m:"中溫冰水",
    start_mau:"OA入口",start_ahu:"MA混風",
    xl_title:"PsychroSolver Pro V9.0 工程核算報告",
    xl_target:"目標設定",xl_flow:"運作風量(CMH)",xl_water:"系統除濕量(L/h)",
    xl_time:"報告時間",xl_mode:"模式",
  };
  const en={
    mode_mau:"MAU Mode",mode_ahu:"AHU Mode",
    title:"PsychroSolver Pro",subtitle:"Final Audit v9.0",
    tab_result:"Results",tab_states:"State Points",tab_chart:"Chart",
    sys_flow:"Air Flow (CMH)",width:"Width (mm)",height:"Height (mm)",
    fan_heat:"Fan Heat (kW)",fan_heat_tip:"Centrifugal fan heat gain, significant in large MAU",
    oa_cond:"OA Condition",ra_cond:"RA & Mix Ratio",oa_ratio:"OA Ratio %",
    target:"Target Design",coil_seq:"Coil Sequence",
    hw:"Hot Water (HW)",chw_m:"Mid-Temp CHW (CHW-M)",chw_l:"Low-Temp CHW (CHW-L)",ww:"Water Wash (WW)",
    cf:"Contact Factor %",outlet_db:"Outlet DB",outlet_rh:"Outlet RH",
    audit:"Design Audit Summary",cycle:"Audit Report Cycle:",active:"active",
    condensate:"Total Condensate",print:"Print PDF",excel:"Export EXCEL",
    tin:"Tin",tout:"Tout",new_stage:"New Stage",
    col_coil:"Component",col_outlet:"Outlet",col_load:"Load(kW)",col_rt:"RT",
    col_shr:"SHR",col_sh:"SH kW",col_lh:"LH kW",col_adp:"ADP / BF",
    col_flow:"Flow(LPM)",col_vel:"Vel(m/s)",col_spec:"Est. Spec",col_pipe:"Rec. Pipe",
    st_point:"State Pt.",st_db:"DB(°C)",st_wb:"WB(°C)",st_dp:"DP(°C)",
    st_rh:"RH(%)",st_w:"W(g/kg)",st_h:"h(kJ/kg)",st_v:"v(m³/kg)",
    show_enth:"Show Enthalpy Lines",show_wb:"Show WB Lines",
    c1:"1.Pre-Heat",c2:"2.Pre-Cool",c3:"3.Water Wash",c4:"4.Dehumidifier",c5:"5.Re-Heat",
    w_hw:"Hot Water",w_ww:"Water Wash",w_chw_l:"Low CHW",w_chw_m:"Mid CHW",
    start_mau:"OA Inlet",start_ahu:"MA Mix",
    xl_title:"PsychroSolver Pro V9.0 Audit Report",
    xl_target:"Target Setting",xl_flow:"Air Flow(CMH)",xl_water:"Total Dehumidification(L/h)",
    xl_time:"Report Time",xl_mode:"Mode",
  };
  const t=lang==='zh'?zh:en;

  const [coils,setCoils]=useState([
    {id:1,energy:'HW',  label:zh.c1,db:36,rh:70, active:true},
    {id:2,energy:'CHW_M',label:zh.c2,db:25,rh:85, active:true},
    {id:3,energy:'WW',  label:zh.c3,efficiency:75,db:18,rh:98,active:true},
    {id:4,energy:'CHW_L',label:zh.c4,db:13,rh:95, active:true},
    {id:5,energy:'HW',  label:zh.c5,db:22,rh:53, active:true},
  ]);

  const VIEW={dbMin:-1,dbMax:51,wMin:-.001,wMax:.036};
  const svgW=1000,svgH=460,mg={top:22,right:60,bottom:42,left:62};
  const xS=db=>((db-VIEW.dbMin)/(VIEW.dbMax-VIEW.dbMin))*(svgW-mg.left-mg.right)+mg.left;
  const yS=w=>svgH-mg.bottom-((w-VIEW.wMin)/(VIEW.wMax-VIEW.wMin))*(svgH-mg.top-mg.bottom);

  // ── Drag & Drop ──
  const handleDrop=useCallback((idx)=>{
    if(dragIdx===null||dragIdx===idx)return;
    setCoils(p=>{const a=[...p],item=a.splice(dragIdx,1)[0];a.splice(idx,0,item);return a;});
    setDragIdx(null);
  },[dragIdx]);

  // ── Core Calculation ──
  const calc=useMemo(()=>{
    const oaS=Psy.byDBRH(oa.db||0,oa.rh||0);
    const raS=Psy.byDBRH(ra.db||0,ra.rh||0);
    const roomS=Psy.byDBRH(room.db||0,room.rh||0);
    let startPt=mode==='MAU'?oaS:Psy.mix(oaS,raS,mixRatio);
    const startLabel=mode==='MAU'?t.start_mau:t.start_ahu;
    const stages=[{label:startLabel,state:startPt,type:'START'}];
    let totalWater=0;
    const faceArea=Math.max(.01,(coilW/1000)*(coilH/1000));
    const faceVel=(airFlow/3600)/faceArea;

    // Fan heat: add to first stage
    if(fanHeat>0){
      const massFlow0=(airFlow||0)/((startPt.v||0.8)*3600);
      const dhFan=fanHeat/massFlow0; // kJ/kg
      const h_after=startPt.h+dhFan;
      const w_after=startPt.w;
      const db_after=(h_after-2501*w_after)/(1.006+1.86*w_after);
      startPt=Psy.byDBW(db_after,w_after);
      stages[0].state=startPt;
    }

    const results=coils.map(coil=>{
      if(!coil.active)return null;
      const start=stages[stages.length-1].state;
      let end;
      if(coil.energy==='WW'){
        const Tw=waterConfig.WW.in;
        const eps=(coil.efficiency??75)/100;
        const satSt=Psy.byDBRH(Tw,100);
        end=Psy.byDBW(start.db+eps*(Tw-start.db),start.w+eps*(satSt.w-start.w));
      } else {
        end=Psy.byDBRH(coil.db||0,coil.rh||0);
      }
      const massFlow=(airFlow||0)/((start.v||0.8)*3600);
      const totalLoad=massFlow*(end.h-start.h); // kW (negative = cooling)
      // Sensible heat only (latent = 0 for heating/humidification)
      const sensLoad=massFlow*1.006*(end.db-start.db); // kW
      const latLoad=massFlow*2501*(end.w-start.w);     // kW (latent)
      const loadAbs=Math.abs(totalLoad);
      const rt=loadAbs/3.51685;
      const wc=waterConfig[coil.energy]||{in:7,out:12};
      const dt=Math.abs(wc.out-wc.in)||1;
      const lpm=(loadAbs*60)/(4.186*dt);
      const pipeSize=getPipeSize(lpm);
      // SHR (only meaningful for cooling coils)
      const isCooling=totalLoad<-0.5;
      const SHR=isCooling?Math.min(1,Math.max(0,Math.abs(sensLoad)/loadAbs)):null;
      // ADP
      const adpResult=isCooling&&start.w>end.w?Psy.calcADP(start,end):null;
      
      // 物理合理性校驗計算 (Thermodynamic & Physical Auditing)
      const warnings=[];
      if(coil.energy==='CHW_L'||coil.energy==='CHW_M'){
        if(wc.in>=(coil.db||0)){
          warnings.push(`冰水進水溫度 (${wc.in}°C) 高於或等於設計出風溫度 (${coil.db}°C)，物理上無法進行降溫！`);
        }
        if(adpResult&&wc.in>=adpResult.db){
          warnings.push(`冰水進水溫度 (${wc.in}°C) 高於或等於盤管 ADP (${adpResult.db.toFixed(1)}°C)，無法析出水分進行除濕！`);
        }
        if(wc.out>=start.db){
          warnings.push(`冰水出水溫度 (${wc.out}°C) 高於或等於進風溫度 (${start.db.toFixed(1)}°C)，違反熱力學第二定律！`);
        }
        if(wc.in>=wc.out){
          warnings.push(`冰水設定溫差異常：進水溫度 (${wc.in}°C) 應小於出水溫度 (${wc.out}°C)！`);
        }
      }else if(coil.energy==='HW'){
        if(wc.in<=(coil.db||0)){
          warnings.push(`熱水進水溫度 (${wc.in}°C) 低於或等於設計出風溫度 (${coil.db}°C)，物理上無法進行加熱！`);
        }
        if(wc.out<=start.db){
          warnings.push(`熱水出水溫度 (${wc.out}°C) 低於或等於進風溫度 (${start.db.toFixed(1)}°C)，違反熱力學第二定律！`);
        }
        if(wc.in<=wc.out){
          warnings.push(`熱水設定溫差異常：進水溫度 (${wc.in}°C) 應大於出水溫度 (${wc.out}°C)！`);
        }
      }
      const hasError=warnings.length>0;

      // Row/Fin estimate (improved)
      const dt_air=Math.abs(start.db-end.db);
      let rowFin="---";
      if(coil.energy!=='WW'){
        const velF=Math.max(.5,faceVel/2.5);
        if(coil.energy==='HW'){rowFin=`${dt_air>15?2:1}R / 10F`;}
        else{const rows=Math.max(4,Math.min(12,Math.round((dt_air/2.5)*velF)));const fpi=faceVel>2.7?14:12;rowFin=`${rows}R / ${fpi}F`;}
      } else {rowFin=lang==='zh'?"噴霧/水洗":"Spray/Wash";}
      if(start.w>end.w){
        totalWater+=(airFlow/start.v)*(start.w-end.w);
      }
      stages.push({label:coil.label,state:end,energy:coil.energy});
      const resCoil=coil.energy==='WW'?{...coil,db:end.db,rh:end.rh}:coil;
      return{...resCoil,start,end,totalLoad,sensLoad,latLoad,rt,lpm,pipeSize,dt,rowFin,faceVelocity:faceVel,SHR,adpResult,warnings,hasError};
    }).filter(Boolean);

    return{stages,results,oaState:oaS,raState:raS,roomState:roomS,totalWater,faceVelocity:faceVel};
  },[mode,oa,ra,room,mixRatio,coils,airFlow,waterConfig,coilW,coilH,fanHeat,lang]);

  // ── Chart Assets ──
  const chartAssets=useMemo(()=>{
    const step=.5;
    // Saturation curve
    let satPath="";
    for(let db=VIEW.dbMin;db<VIEW.dbMax;db+=step){
      const p1={db,w:Psy.byDBRH(db,100).w},p2={db:db+step,w:Psy.byDBRH(db+step,100).w};
      const cl=clip(p1,p2,VIEW);if(cl)satPath+=`M ${xS(cl.x1)} ${yS(cl.y1)} L ${xS(cl.x2)} ${yS(cl.y2)} `;
    }
    // RH lines
    const rhLines=[10,20,30,40,50,60,70,80,90].map(rh=>{
      let path="";
      for(let db=VIEW.dbMin;db<VIEW.dbMax;db+=step){
        const p1={db,w:Psy.byDBRH(db,rh).w},p2={db:db+step,w:Psy.byDBRH(db+step,rh).w};
        const cl=clip(p1,p2,VIEW);if(cl)path+=`M ${xS(cl.x1)} ${yS(cl.y1)} L ${xS(cl.x2)} ${yS(cl.y2)} `;
      }
      // label position: near right edge
      const db_label=Math.min(40,VIEW.dbMax-3);
      const w_label=Psy.byDBRH(db_label,rh).w;
      const inView=db_label>VIEW.dbMin&&db_label<VIEW.dbMax&&w_label>VIEW.wMin&&w_label<VIEW.wMax;
      return{path,rh,lx:xS(db_label),ly:yS(w_label),show:inView};
    });
    // WB lines
    const wbLines=[5,10,15,20,25,30,35].map(Twb=>{
      let path="";
      for(let db=Twb;db<=VIEW.dbMax;db+=step){
        const w1=Psy.wbLineW(db,Twb),w2=Psy.wbLineW(db+step,Twb);
        const p1={db,w:Math.min(w1,Psy.byDBRH(db,100).w)};
        const p2={db:db+step,w:Math.min(w2,Psy.byDBRH(db+step,100).w)};
        if(p1.w<0||p2.w<0)continue;
        const cl=clip(p1,p2,VIEW);if(cl)path+=`M ${xS(cl.x1)} ${yS(cl.y1)} L ${xS(cl.x2)} ${yS(cl.y2)} `;
      }
      // label at left end
      const db_l=Math.max(VIEW.dbMin,Twb);
      const w_l=Psy.wbLineW(db_l,Twb);
      return{path,T:Twb,lx:xS(db_l)+2,ly:yS(w_l)-3};
    });
    // Enthalpy lines
    const enthLines=[20,30,40,50,60,70,80,90,100,110].map(h=>{
      let path="";
      for(let db=VIEW.dbMin;db<VIEW.dbMax;db+=step){
        const w1=Psy.enthLineW(db,h),w2=Psy.enthLineW(db+step,h);
        if(w1<-.001||w2<-.001)continue;
        const wsat1=Psy.byDBRH(db,100).w,wsat2=Psy.byDBRH(db+step,100).w;
        const p1={db,w:Math.min(w1,wsat1)},p2={db:db+step,w:Math.min(w2,wsat2)};
        if(p1.w<VIEW.wMin&&p2.w<VIEW.wMin)continue;
        const cl=clip(p1,p2,VIEW);if(cl)path+=`M ${xS(cl.x1)} ${yS(cl.y1)} L ${xS(cl.x2)} ${yS(cl.y2)} `;
      }
      // label at right edge
      const db_r=VIEW.dbMax-2;
      const w_r=Psy.enthLineW(db_r,h);
      const inView=w_r>=VIEW.wMin&&w_r<=VIEW.wMax;
      return{path,h,lx:xS(db_r)+2,ly:yS(w_r),show:inView};
    });
    // Comfort zone
    const{db:rb,rh:rr}=room;
    const{db:dt,rh:rt}=roomTol;
    const zonePts=[];
    for(let db=rb-dt;db<=rb+dt;db+=.3)zonePts.push({db,w:Psy.byDBRH(db,Math.max(1,rr-rt)).w});
    for(let db=rb+dt;db>=rb-dt;db-=.3)zonePts.push({db,w:Psy.byDBRH(db,Math.min(99,rr+rt)).w});
    let zonePath="";
    if(zonePts.length>1){
      zonePath=`M ${xS(zonePts[0].db)} ${yS(zonePts[0].w)} `;
      zonePts.slice(1).forEach(p=>{zonePath+=`L ${xS(p.db)} ${yS(p.w)} `;});
      zonePath+="Z";
    }
    return{satPath,rhLines,wbLines,enthLines,zonePath};
  },[VIEW,room,roomTol,showEnthLines,showWBLines]);

  // ── Process paths ──
  const processPaths=useMemo(()=>{
    return calc.stages.slice(1).map((s,i)=>{
      const prev=calc.stages[i].state;
      const isHeat=s.energy==='HW',isWW=s.energy==='WW';
      let pathD="";
      for(let j=0;j<80;j++){
        const r1=j/80,r2=(j+1)/80;
        const db1=prev.db+(s.state.db-prev.db)*r1,db2=prev.db+(s.state.db-prev.db)*r2;
        let w1=prev.w+(s.state.w-prev.w)*(isHeat?r1:Math.pow(r1,isWW?1.0:1.15));
        let w2=prev.w+(s.state.w-prev.w)*(isHeat?r2:Math.pow(r2,isWW?1.0:1.15));
        w1=Math.min(w1,Psy.byDBRH(db1,100).w);
        w2=Math.min(w2,Psy.byDBRH(db2,100).w);
        const cl=clip({db:db1,w:w1},{db:db2,w:w2},VIEW);
        if(cl)pathD+=`M ${xS(cl.x1)} ${yS(cl.y1)} L ${xS(cl.x2)} ${yS(cl.y2)} `;
      }
      const color=isHeat?"#f43f5e":isWW?"#14b8a6":"#2563eb";
      return{d:pathD,color};
    });
  },[calc,VIEW]);

  // ── Excel Export ──
  const handleExcel=()=>{
    const wb2=XLSX.utils.book_new();
    const rows=[
      [t.xl_title,""],["",""],[t.xl_target,`${room.db}±${roomTol.db}°C / ${room.rh}±${roomTol.rh}%`],
      [t.xl_flow,airFlow],[t.xl_mode,mode],[t.xl_water,calc.totalWater.toFixed(2)],[t.xl_time,new Date().toLocaleString()],
      ["",""],
      ["Component","Energy","Outlet DB/RH","Load(kW)","RT","SHR","Sensible(kW)","Latent(kW)","ADP(°C)","BF","LPM","Pipe","Spec"],
      ...calc.results.map(r=>[
        r.label,r.energy,`${r.end.db.toFixed(1)}°C/${r.end.rh.toFixed(0)}%`,
        Math.abs(r.totalLoad).toFixed(2),r.rt.toFixed(2),
        r.SHR!=null?r.SHR.toFixed(3):"—",
        Math.abs(r.sensLoad).toFixed(2),Math.abs(r.latLoad).toFixed(2),
        r.adpResult?r.adpResult.db.toFixed(1):"—",r.adpResult?r.adpResult.BF.toFixed(3):"—",
        r.lpm.toFixed(1),r.pipeSize,r.rowFin
      ]),
      ["",""],
      ["State Points","DB(°C)","WB(°C)","DP(°C)","RH(%)","W(g/kg)","h(kJ/kg)","v(m³/kg)"],
      ...calc.stages.map(s=>[
        s.label,s.state.db.toFixed(1),s.state.wb.toFixed(1),s.state.dp.toFixed(1),
        s.state.rh.toFixed(0),(s.state.w*1000).toFixed(2),s.state.h.toFixed(2),s.state.v.toFixed(4)
      ])
    ];
    const ws=XLSX.utils.aoa_to_sheet(rows);
    XLSX.utils.book_append_sheet(wb2,ws,"Report");
    XLSX.writeFile(wb2,`PsychroSolver_V9_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  const coilColor=e=>e==='CHW_L'?'bg-blue-600':e==='CHW_M'?'bg-sky-400':e==='WW'?'bg-teal-500':'bg-rose-500';
  const coilBorder=e=>e==='CHW_L'?'border-l-blue-600':e==='CHW_M'?'border-l-sky-400':e==='WW'?'border-l-teal-500':'border-l-rose-500';

  // ── Print header ──
  const PrintHeader=()=>(
    <div className="print-only p-4 border-b border-slate-200 mb-3 bg-white">
      <div className="flex justify-between items-start mb-3">
        <div><h1 className="text-xl fh font-black uppercase text-slate-900">PsychroSolver Pro v9.0 — Audit Report</h1>
          <p className="text-xs text-slate-400 fm mt-1">{new Date().toLocaleString()}</p></div>
        <span className="bg-slate-900 text-white px-3 py-1 rounded text-xs font-bold">{mode}</span>
      </div>
      <div className="grid grid-cols-4 gap-4 text-xs border border-slate-200 rounded p-3">
        {[["Flow",`${airFlow} CMH`],["Coil",`${coilW}×${coilH}mm`],["Face Vel",`${calc.faceVelocity.toFixed(2)} m/s`],["OA",`${oa.db}°C/${oa.rh}%`],["Target",`${room.db}±${roomTol.db}°C / ${room.rh}±${roomTol.rh}%`],["Condensate",`${calc.totalWater.toFixed(2)} L/h`]].map(([k,v])=>(
          <div key={k}><span className="block text-slate-400 text-[9px] font-bold uppercase mb-0.5">{k}</span><span className="font-bold fm">{v}</span></div>
        ))}
      </div>
    </div>
  );

  return(
    <div className="flex flex-col h-screen overflow-hidden text-xs bg-[#f8fafc]">
      <PrintHeader/>

      {/* Header */}
      <header className="px-4 py-2.5 bg-gradient-to-r from-slate-800 to-slate-900 flex items-center justify-between z-40 shrink-0 shadow-md no-print">
        <div className="flex items-center gap-3">
          <button onClick={()=>setSidebarOpen(o=>!o)} className="p-1.5 rounded-lg bg-white/5 border border-white/10 hover:bg-white/10 text-slate-400 hover:text-white transition shrink-0" title="Toggle Sidebar">
            <Icon name={sidebarOpen?"PanelLeftClose":"PanelLeftOpen"} cls="w-4 h-4"/>
          </button>
          <div className="bg-indigo-600 p-1.5 rounded-lg text-white shadow shrink-0"><Icon name="Target" cls="w-3.5 h-3.5"/></div>
          <div className="flex items-baseline gap-2">
            <h1 className="text-sm font-black fh text-white uppercase italic tracking-tighter">{t.title}</h1>
            <span className="text-[9px] text-slate-500 font-black uppercase tracking-widest fm hidden sm:inline">{t.subtitle}</span>
          </div>
        </div>
        <div className="flex items-center gap-2">
          <div className="flex gap-1 bg-white/5 p-1 rounded-xl border border-white/10">
            {['MAU','AHU'].map(m=>(
              <button key={m} onClick={()=>setMode(m)} className={`px-4 py-1 rounded-lg text-[10px] font-black transition-all ${mode===m?'bg-white text-indigo-900 shadow':'text-white/40 hover:text-white'}`}>
                {m==='MAU'?t.mode_mau:t.mode_ahu}
              </button>
            ))}
          </div>
          <button onClick={()=>setLang(l=>l==='zh'?'en':'zh')} className="px-2 py-1 rounded-lg bg-white/5 border border-white/10 text-white/50 hover:text-white text-[10px] font-bold transition">
            {lang==='zh'?'EN':'中文'}
          </button>
        </div>
      </header>

      {/* App Grid */}
      <div className={`app-grid overflow-hidden ${sidebarOpen?'':'sidebar-hidden'}`}>

        {/* Sidebar */}
        <aside className="border-r border-slate-200 bg-white overflow-y-auto p-3 space-y-4 scr z-30 shadow-sm no-print">
          {/* Air Flow & Coil Size */}
          <div className="bg-gradient-to-br from-indigo-800 to-indigo-950 p-4 rounded-2xl space-y-3 shadow-lg border border-indigo-400/20">
            <div className="text-center">
              <label className="text-[9px] font-black text-indigo-300/60 uppercase block mb-1">{t.sys_flow}</label>
              <input type="number" min="0" value={airFlow} onChange={e=>setAirFlow(+e.target.value||0)}
                className="bg-transparent text-2xl font-black text-white outline-none w-full text-center fh"/>
            </div>
            <div className="grid grid-cols-2 gap-2">
              {[[t.width,coilW,setCoilW],[t.height,coilH,setCoilH]].map(([l,v,s])=>(
                <div key={l} className="bg-white/10 p-2 rounded-xl text-center border border-white/5">
                  <span className="text-[8px] text-indigo-200 block uppercase font-bold">{l}</span>
                  <input type="number" min="1" value={v} onChange={e=>s(+e.target.value||1)}
                    className="bg-transparent w-full text-center font-black text-white outline-none text-xs fm"/>
                </div>
              ))}
            </div>
            {/* Fan Heat */}
            <div className="bg-white/10 rounded-xl p-2 border border-white/10">
              <div className="flex items-center justify-between">
                <span className="text-[9px] text-amber-300 font-black uppercase">{t.fan_heat}</span>
                <input type="number" min="0" step="0.5" value={fanHeat} onChange={e=>setFanHeat(+e.target.value||0)}
                  className="bg-white/10 w-14 text-center rounded-lg p-1 font-black text-amber-200 outline-none text-xs fm border border-amber-400/20"/>
              </div>
              <p className="text-[8px] text-indigo-300/50 mt-1">{t.fan_heat_tip}</p>
            </div>
          </div>

          {/* OA */}
          <div className="p-3 bg-white rounded-xl border border-slate-100 shadow-sm space-y-2 border-l-4 border-l-blue-500">
            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{t.oa_cond}</p>
            <div className="grid grid-cols-2 gap-2">
              {[["DB °C","db",oa,setOa],["RH %","rh",oa,setOa]].map(([l,k,st,set])=>(
                <div key={k} className="bg-slate-50 p-1.5 rounded-lg text-center border border-slate-100">
                  <span className="text-[8px] text-slate-400 block font-bold uppercase">{l}</span>
                  <input type="number" min="0" max="100" value={st[k]}
                    onChange={e=>set(p=>({...p,[k]:e.target.value===''?'':+e.target.value}))}
                    onBlur={e=>{if(k==='rh'){const v=parseFloat(e.target.value);set(p=>({...p,rh:isNaN(v)?50:Math.min(100,Math.max(0.1,v))}))}}}
                    className="bg-transparent w-full text-center font-bold text-blue-600 outline-none text-xs fm"/>
                </div>
              ))}
            </div>
            {/* OA psychro preview */}
            {(()=>{const s=Psy.byDBRH(oa.db,oa.rh);return(
              <div className="grid grid-cols-3 gap-1 text-[9px] text-center mt-1">
                {[["WB",s.wb.toFixed(1)+"°C"],["DP",s.dp.toFixed(1)+"°C"],["h",s.h.toFixed(1)+" kJ"],["W",(s.w*1000).toFixed(1)+"g"],["RH",s.rh.toFixed(0)+"%"],["v",s.v.toFixed(4)]].map(([k,v])=>(
                  <div key={k} className="bg-blue-50/50 rounded p-0.5">
                    <span className="text-blue-300 block font-bold">{k}</span>
                    <span className="text-blue-700 font-black fm">{v}</span>
                  </div>
                ))}
              </div>
            );})()}
          </div>

          {/* RA (AHU) */}
          {mode==='AHU'&&(
            <div className="p-3 bg-emerald-50/50 rounded-xl border border-emerald-100 shadow-sm space-y-2 border-l-4 border-l-emerald-500">
              <p className="text-[10px] font-black text-emerald-800 uppercase tracking-widest">{t.ra_cond}</p>
              <div className="grid grid-cols-2 gap-2">
                {[["RA DB °C","db",ra,setRa],["RA RH %","rh",ra,setRa]].map(([l,k,st,set])=>(
                  <div key={k} className="bg-white p-1.5 rounded-lg text-center border border-emerald-100">
                    <span className="text-[8px] text-emerald-400 block font-bold uppercase">{l}</span>
                    <input type="number" min="0" max="100" value={st[k]}
                      onChange={e=>set(p=>({...p,[k]:e.target.value===''?'':+e.target.value}))}
                      onBlur={e=>{if(k==='rh'){const v=parseFloat(e.target.value);set(p=>({...p,rh:isNaN(v)?50:Math.min(100,Math.max(0.1,v))}))}}}
                      className="bg-transparent w-full text-center font-bold text-emerald-600 outline-none text-xs fm"/>
                  </div>
                ))}
              </div>
              <div className="flex items-center justify-between bg-emerald-600 text-white rounded-lg px-3 py-1.5">
                <span className="text-[9px] font-black uppercase">{t.oa_ratio}</span>
                <input type="number" min="0" max="100" value={mixRatio} onChange={e=>setMixRatio(+e.target.value||0)}
                  className="bg-emerald-800 w-10 text-center py-0.5 rounded font-black text-xs fm outline-none"/>
              </div>
            </div>
          )}

          {/* Target */}
          <div className="p-3 bg-slate-800 text-white rounded-xl border border-slate-700 space-y-3 shadow-xl">
            <p className="text-[9px] font-black text-indigo-300 uppercase tracking-widest flex items-center gap-1.5">
              <span className="w-1 h-3 bg-indigo-500 rounded-full animate-pulse inline-block"/>
              {t.target}
            </p>
            {[["Base DB","db",room,setRoom,"rh_tol","db",roomTol,setRoomTol],["Base RH","rh",room,setRoom,"rh_tol","rh",roomTol,setRoomTol]].map(([l,k,st,set,_,tk,tt,ts])=>(
              <div key={k} className="flex items-center gap-2">
                <div className="flex-1 bg-white/5 p-1.5 rounded-lg text-center border border-white/5">
                  <span className="text-[8px] text-slate-400 block uppercase">{l}</span>
                  <input type="number" min="0" max="100" value={st[k]}
                    onChange={e=>set(p=>({...p,[k]:e.target.value===''?'':+e.target.value}))}
                    onBlur={e=>{if(k==='rh'){const v=parseFloat(e.target.value);set(p=>({...p,rh:isNaN(v)?50:Math.min(100,Math.max(0.1,v))}))}}}
                    className="bg-transparent w-full text-center font-bold text-white outline-none text-xs fm"/>
                </div>
                <span className="text-indigo-500 font-black">±</span>
                <input type="number" min="0" step=".1" value={tt[tk]} onChange={e=>ts(p=>({...p,[tk]:+e.target.value}))}
                  className="w-10 bg-indigo-900/40 p-1.5 rounded-lg text-center font-black text-indigo-100 outline-none text-xs fm border border-indigo-500/30"/>
              </div>
            ))}
          </div>

          {/* Coil Sequence */}
          <section className="space-y-2 pb-10">
            <div className="flex justify-between items-center text-[9px] font-black text-slate-400 uppercase border-b border-slate-100 pb-2">
              <span>{t.coil_seq}</span>
              <button onClick={()=>setCoils(p=>[...p,{id:Date.now(),energy:'HW',label:`${p.length+1}.${t.new_stage}`,db:25,rh:50,efficiency:75,active:true}])}
                className="p-1 bg-indigo-600 text-white rounded active:scale-95 shadow-md">
                <Icon name="Plus" cls="w-3 h-3"/>
              </button>
            </div>
            {coils.map((c,i)=>{
              const r = calc.results.find(x => x && x.id === c.id);
              return (
                <div key={c.id} draggable onDragStart={()=>setDragIdx(i)} onDragOver={e=>e.preventDefault()} onDrop={()=>handleDrop(i)}
                  className={`p-2.5 bg-white border border-slate-100 rounded-xl relative overflow-hidden shadow-sm cursor-move group border-l-4 ${coilBorder(c.energy)} ${dragIdx===i?'dragging':''} ${r && r.hasError ? 'border-rose-300 bg-rose-50/5' : ''}`}>
                  <div className="flex justify-between items-center mb-2 pl-1">
                    <div className="flex items-center gap-1.5">
                      <Icon name="GripVertical" cls="w-3.5 h-3.5 text-slate-300 group-hover:text-indigo-400"/>
                      <input type="text" value={c.label}
                        onChange={e=>{const v=e.target.value;setCoils(p=>p.map(x=>x.id===c.id?{...x,label:v}:x));}}
                        className="bg-transparent text-[11px] font-black text-slate-700 outline-none w-24 focus:text-indigo-600 truncate"/>
                      <button onClick={()=>setCoils(p=>[...p].map(x=>x.id===c.id?{...x,active:!x.active}:x))}
                        className={`text-[9px] font-bold px-1.5 py-0.5 rounded-full ${c.active?'bg-emerald-100 text-emerald-600':'bg-slate-100 text-slate-400'}`}>
                        {c.active?"ON":"OFF"}
                      </button>
                      {r && r.hasError && (
                        <span className="inline-flex items-center text-[8px] font-black bg-rose-100 text-rose-600 px-1.5 py-0.5 rounded-md animate-pulse border border-rose-200" title={r.warnings.join('\n')}>
                          水溫異常
                        </span>
                      )}
                    </div>
                    <button onClick={()=>setCoils(p=>p.filter(x=>x.id!==c.id))} className="text-slate-200 hover:text-rose-500">
                      <Icon name="Trash2" cls="w-3 h-3"/>
                    </button>
                  </div>
                  <select value={c.energy} onChange={e=>{const v=e.target.value;setCoils(p=>p.map(x=>x.id===c.id?{...x,energy:v}:x));}}
                    className="w-full bg-slate-50 text-[10px] font-bold text-slate-500 p-1.5 rounded-lg border border-slate-100 mb-2 cursor-pointer">
                    <option value="HW">{t.hw}</option><option value="CHW_M">{t.chw_m}</option>
                    <option value="CHW_L">{t.chw_l}</option><option value="WW">{t.ww}</option>
                  </select>
                  {c.energy==='WW'?(
                    <div className="bg-teal-50/50 p-2 rounded-lg border border-teal-100">
                      <label className="text-[8px] font-black text-teal-600 block uppercase mb-1">{t.cf}</label>
                      <div className="flex items-center gap-2">
                        <input type="range" min="10" max="100" value={c.efficiency??75}
                          onChange={e=>{const v=+e.target.value;setCoils(p=>p.map(x=>x.id===c.id?{...x,efficiency:v}:x));}}
                          className="flex-1 h-1 bg-teal-200 rounded-lg appearance-none cursor-pointer"/>
                        <input type="number" min="0" max="100" value={c.efficiency??75}
                          onChange={e=>{const v=+e.target.value;setCoils(p=>p.map(x=>x.id===c.id?{...x,efficiency:v}:x));}}

                  </div>
                </div>
                <button onClick={()=>window.print()} className="bg-indigo-600 hover:bg-indigo-700 px-5 py-2.5 rounded-2xl text-[10px] font-black text-white flex items-center gap-2 shadow-lg transition-all">
                  <Icon name="Printer" cls="w-3.5 h-3.5"/> {t.print}
                </button>
                <button onClick={handleExcel} className="bg-slate-800 hover:bg-slate-900 px-5 py-2.5 rounded-2xl text-[10px] font-black text-white flex items-center gap-2 shadow-lg transition-all">
                  <Icon name="DownloadCloud" cls="w-3.5 h-3.5"/> {t.excel}
                </button>
              </div>
            </div>

            {/* Tabs */}
            <div className="flex border-b border-slate-100 no-print">
              {(() => {
                const errorCount = calc.results.filter(x => x.hasError).length;

                  const isWaterConfig = k === 'chart';
                  const hasErrors = isWaterConfig && errorCount > 0;
                  return (
                    <button key={k} onClick={()=>setActiveTab(k)}

                      {hasErrors && (

                      <th className="p-3 text-center bg-violet-900 border-l border-white/5">{t.col_sh}</th>
                      <th className="p-3 text-center bg-violet-900 border-l border-white/5">{t.col_lh}</th>
                      <th className="p-3 text-center bg-indigo-800 border-l border-white/5 min-w-[110px]">{t.col_adp}</th>
                      <th className="p-3 text-center border-l border-white/5">{t.col_flow}</th>
                      <th className="p-3 text-center border-l border-white/5">{t.col_vel}</th>
                      <th className="p-3 text-center border-l border-white/5">{t.col_spec}</th>
                      <th className="p-3 text-center bg-emerald-800 border-l border-white/5">{t.col_pipe}</th>
                    </tr>
                  </thead>
                  <tbody className="text-[10px]">
                    {calc.results.map((r,i)=>(
                      <tr key={r.id} className={`border-b border-slate-50 hover:bg-slate-50/80 transition-all group ${r.hasError ? 'bg-rose-50/10' : ''}`}>
                        <td className="p-3 pl-5 font-black flex items-center gap-2 italic text-slate-700">
                          <div className={`w-2 h-2 rounded-full ${coilColor(r.energy)} shrink-0`}/>
                          <span className="text-[11px] fh group-hover:text-indigo-600 uppercase truncate">{r.label}</span>

                        <td className="p-3 text-center fm font-bold text-indigo-600 border-l border-slate-50 bg-indigo-50/20">
                          {r.end.db.toFixed(1)}°C / {r.end.rh.toFixed(0)}%
                        </td>
                        <td className="p-3 text-center fm font-black text-slate-800 text-base border-l border-slate-50">{Math.abs(r.totalLoad).toFixed(1)}</td>

                        <td className="p-3 text-center fm font-bold text-blue-600 border-l border-slate-50 bg-violet-50/30">{Math.abs(r.latLoad).toFixed(1)}</td>

                              <div className="text-slate-500">BF = {r.adpResult.BF.toFixed(3)}</div>
                            </div>
                          ):<span className="text-slate-300">—</span>}

                        <td className="p-3 text-center fm font-black text-slate-800 text-base border-l border-slate-50">{r.lpm.toFixed(1)}</td>
                        <td className={`p-3 text-center fm font-black text-base border-l border-slate-50 ${r.faceVelocity>2.8?'text-rose-500 animate-pulse':'text-slate-800'}`}>{r.faceVelocity.toFixed(2)}</td>
                        <td className="p-3 text-center fm font-black text-slate-700 text-xs border-l border-slate-50 uppercase">{r.rowFin}</td>
                        <td className="p-3 text-center border-l border-slate-50 bg-emerald-50/20">
                          <span className={`fh font-black italic text-2xl ${r.hasError ? 'text-rose-500' : 'text-emerald-600'}`}>
                            {r.pipeSize}

                          {r.hasError && (
                            <div className="text-[8px] text-rose-500 font-bold mt-1 flex items-center justify-center gap-0.5 cursor-help" title={r.warnings.join('\n')}>
                              <span className="w-1.5 h-1.5 rounded-full bg-rose-500 inline-block animate-pulse"/>

                            </div>

                        </td>
                      </tr>

              </div>

            {/* Tab: State Points */}
            {activeTab==='states'&&(
              <div className="overflow-x-auto scr">
                <table className="w-full text-left border-collapse min-w-[760px]">
                  <thead>
                    <tr className="bg-slate-800 text-white text-[8px] font-black uppercase tracking-wider fh">
                      {["#",t.st_point,t.st_db,t.st_wb,t.st_dp,t.st_rh,t.st_w,t.st_h,t.st_v].map(h=>(
                        <th key={h} className="p-3 text-center border-l border-white/5 first:border-l-0">{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody className="text-[10px]">
                    {calc.stages.map((s,i)=>(
                      <tr key={i} className="border-b border-slate-50 hover:bg-slate-50 fin">
                        <td className="p-3 text-center font-black text-white">
                          <span className={`inline-flex items-center justify-center w-5 h-5 rounded-full text-[9px] ${i===0?'bg-slate-700':`${i%2?'bg-indigo-600':'bg-blue-500'}`}`}>{i+1}</span>
                </td>
                        <td className="p-3 font-black text-slate-700 fh italic uppercase text-[10px] flex items-center gap-1.5">
                          {i>0&&<span className={`w-1.5 h-1.5 rounded-full ${coilColor(calc.stages[i].energy)}`}/>}
                          {s.label}
                        </td>
                        {[
                          [s.state.db.toFixed(2),"text-orange-600"],
                          [s.state.wb.toFixed(2),"text-teal-600"],
                          [s.state.dp.toFixed(2),"text-blue-600"],
                          [s.state.rh.toFixed(1),"text-slate-600"],
                          [(s.state.w*1000).toFixed(3),"text-indigo-600"],

                      </td>
                    </tr>
                  </tfoot>
                </table>
              </div>
            )}

                        {/* Tab: Water Config */}
            {activeTab==='chart'&&(
              <div className="p-4 md:p-6 fin space-y-6">

                  <h4 className="text-sm font-bold text-slate-800 uppercase tracking-tight">熱交換器水路核算與評估 (Water Heat Exchanger Audit)</h4>
                  <p className="text-[10px] text-slate-400 mt-1">即時分析進出水溫、流量、管徑及熱力學第二定律合理性限制</p>
                </div>

                    ['CHW_L','低溫冰水 CHW-L','blue', 'bg-blue-50/40', 'border-blue-100', 'text-blue-700', 'bg-blue-600'],
                    ['CHW_M','中溫冰水 CHW-M','sky', 'bg-sky-50/40', 'border-sky-100', 'text-sky-700', 'bg-sky-500'],
                    ['HW','熱水 HW','rose', 'bg-rose-50/40', 'border-rose-100', 'text-rose-700', 'bg-rose-500'],
                    ['WW','水洗 WW','teal', 'bg-teal-50/40', 'border-teal-100', 'text-teal-700', 'bg-teal-500']
                  ].map(([k,label,color,bgColor,borderColor,textColor,badgeBg])=>{
                    const activeCoils = calc.results.filter(x => x && x.energy === k);
                    const isActive = activeCoils.length > 0;
                    const wc = waterConfig[k];
                    const dt = Math.abs(wc.out - wc.in) || 1;
                    
                    let totalLoad = 0;
                    let totalRT = 0;
                    let totalLPM = 0;
                    let pipeSize = '---';
                    let coilWarnings = [];
                    
                    if (isActive) {
                      totalLoad = activeCoils.reduce((sum, x) => sum + Math.abs(x.totalLoad), 0);
                      totalRT = totalLoad / 3.51685;
                      totalLPM = (totalLoad * 60) / (4.186 * dt);
                      pipeSize = getPipeSize(totalLPM);
                      coilWarnings = activeCoils.flatMap(x => x.warnings);
                    }
                    const hasError = coilWarnings.length > 0;

                    return (
                      <div key={k} className={`border rounded-2xl p-4 transition-all duration-300 shadow-sm bg-white ${hasError ? 'border-rose-300 shadow-rose-100/50 bg-rose-50/10' : isActive ? 'border-slate-200' : 'border-slate-100 opacity-75'}`}>

                            {isActive && (
                              <p className="text-[8px] text-slate-400 mt-0.5">

                          <div>
                            {!isActive ? (

                              </span>
                            ) : hasError ? (
                              <span className="inline-flex items-center gap-1 text-[8px] font-black bg-rose-100 border border-rose-200 text-rose-600 px-2.5 py-0.5 rounded-full animate-pulse shadow-sm">
                                ⚠️ 物理衝突
                              </span>
                            ) : (
                              <span className="inline-flex items-center gap-1 text-[8px] font-black bg-emerald-100 border border-emerald-200 text-emerald-600 px-2.5 py-0.5 rounded-full shadow-sm">
                                ✅ 物理合理
                              </span>
                            )}
                          </div>
                        </div>

                        {/* Input Grid */}
                        <div className="grid grid-cols-2 gap-4 mb-4">
                          {[['進水 Tin', 'in'], ['出水 Tout', 'out']].map(([l,f])=>(
                            <div key={f} className="relative">
                              <span className="text-[8px] text-slate-400 block mb-1 font-bold uppercase">{l} (°C)</span>
                              <div className="relative flex items-center">
                                <input type="number" step="0.1" value={wc[f]}
                                  onChange={e=>setWaterConfig(p=>({...p,[k]:{...p[k],[f]:+e.target.value}}))}
                                  className="w-full bg-slate-50 hover:bg-slate-100/50 focus:bg-white border border-slate-200 focus:border-indigo-500 rounded-xl p-2.5 pl-3 text-left font-black text-slate-800 outline-none text-xs fm transition-all"/>
                              </div>
                            </div>
                          ))}
                        </div>

                        {/* Live Summary Metrics */}
                        {isActive ? (
                          <div className="bg-slate-50/80 rounded-xl p-3 space-y-2.5 border border-slate-100/80 fm text-[10px]">
                            <div className="grid grid-cols-2 gap-2 text-[9px] text-slate-500">
                              <div className="flex justify-between border-r border-slate-200/60 pr-2">
                                <span>水溫差 ΔT</span>
                                <span className="font-bold text-slate-700">{dt.toFixed(1)} °C</span>
                              </div>
                              <div className="flex justify-between pl-1">
                                <span>換熱負荷</span>
                                <span className="font-bold text-slate-700">{totalLoad.toFixed(1)} kW</span>
                              </div>
                              <div className="flex justify-between border-r border-slate-200/60 pr-2">
                                <span>換熱噸數</span>
                                <span className="font-bold text-slate-700">{totalRT.toFixed(2)} RT</span>
                              </div>
                              <div className="flex justify-between pl-1">
                                <span>計算水流量</span>
                                <span className="font-bold text-slate-700">{totalLPM.toFixed(1)} LPM</span>
                              </div>
                            </div>
                            <div className="flex items-center justify-between border-t border-slate-200/40 pt-2.5">
                              <span className="text-slate-500 font-bold uppercase tracking-wider text-[8px]">建議水管管徑</span>
                              <span className="inline-flex items-center px-2.5 py-0.5 rounded-lg bg-emerald-600 text-white font-black fh text-xs italic tracking-tighter shadow-md animate-pulse">
                                {pipeSize}
                              </span>
                            </div>
                          </div>
                        ) : (
                          <div className="bg-slate-50/50 rounded-xl p-3 border border-slate-100 text-slate-400 text-[9px] leading-relaxed text-center">
                            此段水路目前無作用中的盤管。可在左側「盤管處理序列」中啟用對應盤管段，以進行熱力學核算。
                          </div>
                        )}

                        {/* Error Messages Container */}
                        {hasError && (
                          <div className="mt-4 bg-rose-50 border border-rose-100 rounded-xl p-3 text-[9px] text-rose-600 font-bold space-y-1.5 shadow-inner">
                            {coilWarnings.map((warning, wIdx) => (
                              <div key={wIdx} className="flex items-start gap-1.5">
                                <span className="text-rose-500 text-[10px] shrink-0 mt-0.5">⚠️</span>
                                <span className="leading-normal">{warning}</span>
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
          <div className="h-6 shrink-0"/>
        </main>
      </div>
      {hoveredPoint&&(
        <div className="fixed pointer-events-none z-50 hidden sm:block no-print"
          style={{left:`max(10px,min(80vw,${xS(hoveredPoint.state.db)+(sidebarOpen?312:0)+10}px))`,top:`${yS(hoveredPoint.state.w)+82}px`}}>
          <div className="bg-slate-900/95 text-white p-4 rounded-2xl shadow-2xl w-52 border border-white/10 fin">
            <h4 className="text-[10px] font-black uppercase text-indigo-400 italic mb-2 border-b border-white/5 pb-1.5 fh truncate">{hoveredPoint.label}</h4>
            <div className="space-y-1.5 text-[9px] fm">
              {[["DB / WB",`${hoveredPoint.state.db.toFixed(1)} / ${hoveredPoint.state.wb.toFixed(1)} °C`,"text-orange-300"],
                ["RH / DP",`${hoveredPoint.state.rh.toFixed(0)}% / ${hoveredPoint.state.dp.toFixed(1)} °C`,"text-blue-300"],
                ["Enthalpy h",`${hoveredPoint.state.h.toFixed(2)} kJ/kg`,"text-teal-400"],
                ["Humidity W",`${(hoveredPoint.state.w*1000).toFixed(3)} g/kg`,"text-indigo-400"],
                ["Specific Vol v",`${hoveredPoint.state.v.toFixed(4)} m³/kg`,"text-slate-400"],
              ].map(([k,v,cls])=>(
                <div key={k} className="flex justify-between gap-2">
                  <span className="text-slate-500">{k}</span>
                  <span className={`font-bold ${cls}`}>{v}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
