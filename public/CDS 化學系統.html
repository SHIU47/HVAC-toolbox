const Q_UNITS = {
  LPM:   { label:"L/min (LPM)", toLPM:v=>v,            fromLPM:v=>v },
  mLmin: { label:"mL/min",      toLPM:v=>v/1000,       fromLPM:v=>v*1000 },
  m3h:   { label:"m³/h",        toLPM:v=>v*1000/60,    fromLPM:v=>v*60/1000 },
  GPM:   { label:"GPM (US)",     toLPM:v=>v*3.78541,   fromLPM:v=>v/3.78541 },
};

const PIPE_SIZES = [
  { label:"15A (½\")",  id_mm:15.80 }, { label:"20A (¾\")",  id_mm:20.93 },
  { label:"25A (1\")",  id_mm:26.64 }, { label:"40A (1½\")", id_mm:40.89 },
  { label:"50A (2\")",  id_mm:52.50 }, { label:"65A (2½\")", id_mm:62.71 },
  { label:"80A (3\")",  id_mm:77.93 }, { label:"100A (4\")", id_mm:102.26 },
];

function waterVaporKpa(tC) {
  const pts = [[0,0.61],[10,1.23],[20,2.34],[25,3.17],[30,4.24],[40,7.38],[50,12.35],[60,19.94],[70,31.19],[80,47.39]];
  if(tC<=pts[0][0]) return pts[0][1];
  if(tC>=pts[pts.length-1][0]) return pts[pts.length-1][1];
  for(let i=0;i<pts.length-1;i++){
    if(tC>=pts[i][0] && tC<pts[i+1][0]){
      const f=(tC-pts[i][0])/(pts[i+1][0]-pts[i][0]);
      return pts[i][1]+f*(pts[i+1][1]-pts[i][1]);
    }
  }
  return 3.17;
}

// ─── Core Calculation ─────────────────────────────────────────────────────────
function calcCDS({ chemKey, matKey, flowLPM, pipeLen, elevation, fittings,
                   filterQty, filterDP, valveQty, valveDP,
                   reqPressureBar, pumpMaxPBar, tempC,
                   suctionLen, suctionElev, tankPressBar, safetyMargin }) {
  const chem = CHEM_DB[chemKey];
  const mat  = MATERIAL_DB[matKey];
  const rho  = chem.sg * 1000;
  const mu   = (chem.visc / 1000);
  const Q_m3s= flowLPM / 60000;
  const margin = safetyMargin ? 0.85 : 1.0;
  const maxV   = Math.min(mat.maxV, chem.maxVelocity) * margin;

  const totalK = Object.entries(fittings).reduce((sum,[k,cnt]) => {
    return sum + (FITTING_DB[k]?.K || 0) * cnt;
  }, 0);

  const results = PIPE_SIZES.map(pipe => {
    const D   = pipe.id_mm / 1000;
    const A   = Math.PI * D * D / 4;
    const v   = Q_m3s / A;
    const Re  = (rho * v * D) / mu;

    let f, regimeKey;
    if (Re < 2000) {
      f = 64 / Math.max(Re, 1); regimeKey = "Laminar";
    } else if (Re < 4000) {
      f = 64 / Re; regimeKey = "Transition";
    } else {
      f = 0.25 / Math.pow(Math.log10(mat.eps/(3.7*D) + 5.74/Math.pow(Re,0.9)), 2);
      regimeKey = "Turbulent";
    }

    const v2_2g = (v * v) / (2 * G);
    const hFriction  = f * (pipeLen / D) * v2_2g;
    const hFitting   = totalK * v2_2g;
    const hElevation = elevation;
    const hFilter    = (filterQty * filterDP * 1e5) / (rho * G);
    const hValve     = (valveQty  * valveDP  * 1e5) / (rho * G);
    const hReqP      = (reqPressureBar * 1e5) / (rho * G);
    const TDH        = hFriction + hFitting + hElevation + hFilter + hValve + hReqP;
    const P_pump_bar = (rho * G * TDH) / 1e5;

    const dp_fric   = (rho * G * hFriction)  / 1e5;
    const dp_fit    = (rho * G * hFitting)    / 1e5;
    const dp_elev   = (rho * G * hElevation) / 1e5;
    const dp_filter = filterQty * filterDP;
    const dp_valve  = valveQty  * valveDP;
    const dp_reqP   = reqPressureBar;

    const v_suction   = Q_m3s / A;
    const Re_suct     = (rho * v_suction * D) / mu;
    let f_suct = Re_suct < 2000 ? 64/Math.max(Re_suct,1) : 0.25/Math.pow(Math.log10(mat.eps/(3.7*D)+5.74/Math.pow(Re_suct,0.9)),2);
    const Hf_suction  = f_suct * (suctionLen / D) * (v_suction*v_suction)/(2*G);
    const P_vapor_Pa  = (chem.vaporP || waterVaporKpa(tempC)) * 1000;
    const NPSHa       = ((P_ATM + tankPressBar*1e5) / (rho*G)) + suctionElev - Hf_suction - P_vapor_Pa/(rho*G);

    const minV = chem.minV;
    let vColor = "#10b981";
    if (v < minV || v > maxV) vColor = "#ef4444";
    else if (v < minV*1.2 || v > maxV*0.9) vColor = "#f59e0b";

    const pSafe = P_pump_bar <= pumpMaxPBar * margin;
    const vSafe = v >= minV && v <= maxV;

    let score = 100;
    const targetV = (minV + maxV) / 2;
    score -= Math.abs(v - targetV) * 25;
    if (P_pump_bar < pumpMaxPBar * margin) score += (pumpMaxPBar - P_pump_bar) * 8;
    if (v < minV)    score -= 300;
    if (v > maxV)    score -= 500;
    if (!pSafe)      score -= 1000;
    if (NPSHa < 0.5) score -= 200;

    return {
      ...pipe, D, A, v:+v.toFixed(3), Re:Math.round(Re), f:+f.toFixed(4),
      regimeKey, TDH:+TDH.toFixed(2), P_pump_bar:+P_pump_bar.toFixed(3),
      dp_fric:+dp_fric.toFixed(3), dp_fit:+dp_fit.toFixed(3),
      dp_elev:+dp_elev.toFixed(3), dp_filter:+dp_filter.toFixed(3),
      dp_valve:+dp_valve.toFixed(3), dp_reqP:+dp_reqP.toFixed(3),
      NPSHa:+NPSHa.toFixed(2), vColor, pSafe, vSafe, score,
      isRecommended:false,
    };
  });

  results.sort((a,b)=>b.score-a.score);
  const optimal = results[0];
  if(optimal) optimal.isRecommended = true;
  results.sort((a,b)=>a.id_mm-b.id_mm);

  return { results, optimal: results.find(r=>r.isRecommended) || results[0] };
}

function App() {
  const [lang, setLang] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get('lang') === 'en' ? 'en' : 'zh';
  });
  const t = i18nData[lang];

  const toggleLang = () => {
    const newLang = lang === 'zh' ? 'en' : 'zh';
    setLang(newLang);
    try {
      const url = new URL(window.location);
      url.searchParams.set('lang', newLang);
      window.history.pushState({}, '', url);
    } catch (error) {
      console.warn("無法更新網址參數 (Sandbox 限制):", error);
    }
  };

  const [showHelp, setShowHelp]     = useState(false);
  const [safetyM, setSafetyM]       = useState(false);
  const [chemKey, setChemKey]       = useState("H2SO4_96");
  const [matKey, setMatKey]         = useState("PFA");
  const [qUnit, setQUnit]           = useState("LPM");
  const [flowVal, setFlowVal]       = useState(40);

  const [params, setParams] = useState({
    pipeLen: 80, elevation: 8, tempC: 25,
    filterQty: 2, filterDP: 0.3, valveQty: 0, valveDP: 0.0,
    reqPressureBar: 1.5, pumpMaxPBar: 6.0,
    suctionLen: 5, suctionElev: 1.0, tankPressBar: 0,
  });

  const [fittings, setFittings] = useState({
    elbow90lr:5, elbow90sr:0, elbow45:2, teeRun:3, teeBranch:1,
    diaphragm:8, ballValve:0, gateValve:0, checkSwing:1, checkWafer:0, yStrainer:1, reducer:0,
  });

  const set = useCallback((k,v) => setParams(p=>({...p,[k]:v})), []);
  const setFit = useCallback((k,v) => setFittings(f=>({...f,[k]:v})), []);

  useEffect(() => {
    const c = CHEM_DB[chemKey];
    if(c) setMatKey(c.defaultMat);
  }, [chemKey]);

  const chem = CHEM_DB[chemKey];
  const mat  = MATERIAL_DB[matKey];
  const flowLPM = Q_UNITS[qUnit].toLPM(flowVal);

  const { results, optimal } = useMemo(() => calcCDS({
    chemKey, matKey, flowLPM, pipeLen: params.pipeLen, elevation: params.elevation,
    fittings, filterQty: params.filterQty, filterDP: params.filterDP,
    valveQty: params.valveQty, valveDP: params.valveDP,
    reqPressureBar: params.reqPressureBar, pumpMaxPBar: params.pumpMaxPBar,
    tempC: params.tempC, suctionLen: params.suctionLen, suctionElev: params.suctionElev,
    tankPressBar: params.tankPressBar, safetyMargin: safetyM,
  }), [chemKey, matKey, flowLPM, params, fittings, safetyM]);

  const warnings = [];
  if (optimal) {
    if (optimal.v < chem.minV)
      warnings.push({ sev:"err", msg: t.warnings.lowVel(optimal.v, chem.minV) });
    if (optimal.v > Math.min(mat.maxV, chem.maxVelocity))
      warnings.push({ sev:"err", msg: t.warnings.highVel(optimal.v) });
    if (optimal.NPSHa < 0.5)
      warnings.push({ sev:"err", msg: t.warnings.npshDanger(optimal.NPSHa) });
    else if (optimal.NPSHa < 1.5)
      warnings.push({ sev:"warn", msg: t.warnings.npshWarn(optimal.NPSHa) });
    if (optimal.P_pump_bar > params.pumpMaxPBar * (safetyM?0.85:1.0))
      warnings.push({ sev:"err", msg: t.warnings.pumpOverP(optimal.P_pump_bar, params.pumpMaxPBar) });
    if (chem.visc >= 20)
      warnings.push({ sev:"warn", msg: t.warnings.highVisc(chem.visc) });
    if (chem.heatTrace)
      warnings.push({ sev:"info", msg: t.warnings.heatTrace });
    if (optimal.regimeKey === "Laminar" && params.pipeLen > 80)
      warnings.push({ sev:"warn", msg: t.warnings.laminar(optimal.Re, params.pipeLen) });
    const fitDPbar = optimal.dp_fit;
    const frictDPbar = optimal.dp_fric;
    if (fitDPbar > frictDPbar * 0.8)
      warnings.push({ sev:"warn", msg: t.warnings.fittingDrop(fitDPbar.toFixed(3)) });
    if (chem.groupId === "cmp")
      warnings.push({ sev:"info", msg: t.warnings.cmpLoop });
  }

  const chartData = results.map(r => ({
    label: r.label.split(' ')[0],
    [t.dpFric]: +r.dp_fric.toFixed(3),
    [t.dpFit]:  +r.dp_fit.toFixed(3),
    [t.dpElev]: +r.dp_elev.toFixed(3),
    [t.dpFilter]: +(r.dp_filter+r.dp_valve).toFixed(3),
    [t.dpReq]:  +r.dp_reqP.toFixed(3),
  }));

  const totalKDisplay = Object.entries(fittings).reduce((s,[k,c])=>s+(FITTING_DB[k]?.K||0)*c,0);

  const groupedChems = useMemo(() => {
    const g = {};
    Object.entries(CHEM_DB).forEach(([k,v]) => {
      const grp = v.groupName[lang];
      if(!g[grp]) g[grp] = [];
      g[grp].push([k,v]);
    });
    return g;
  }, [lang]);

  const overallPass = warnings.filter(w=>w.sev==="err").length === 0;

  return (
    <div className="min-h-screen bg-slate-100 pb-16">
      {showHelp && <HelpModal onClose={()=>setShowHelp(false)} lang={lang}/>}

      {/* Header */}
      <div className="bg-slate-900 text-white">
        <div className="max-w-7xl mx-auto px-5 py-4 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <div className="bg-emerald-600 rounded-xl p-2.5">
              <Ic d={ICONS.beaker} size={20} className="text-white"/>
            </div>
            <div>
              <div className="flex items-center gap-2">
                <span className="font-bold text-lg">{t.appTitle}</span>
                <span className="bg-emerald-600 text-white text-[10px] mono font-bold px-2 py-0.5 rounded">v3.0</span>
              </div>
              <p className="text-slate-400 text-xs mt-0.5">{t.appDesc}</p>
            </div>
          </div>
          <div className="flex items-center gap-3 no-print">
            <button onClick={toggleLang} className="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-slate-400 hover:text-white transition text-xs font-bold">
              <Ic d={ICONS.globe} size={14}/> {lang === 'zh' ? 'English' : '中文'}
            </button>
            <button onClick={()=>setSafetyM(!safetyM)}
              className={`flex items-center gap-2 px-3 py-2 rounded-xl border text-xs font-bold transition-all
                ${safetyM?'bg-blue-500/20 border-blue-400/50 text-blue-200':'bg-white/5 border-white/10 text-slate-400 hover:bg-white/10'}`}>
              <Ic d={ICONS.shield} size={14} className={safetyM?"text-blue-400":"text-slate-500"}/>
              {safetyM ? t.safetyMarginOn : t.safetyMarginOff}
            </button>
            <button onClick={()=>setShowHelp(true)}
              className="w-9 h-9 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center hover:bg-white/10 text-slate-400 hover:text-white">
              <Ic d={ICONS.help} size={16}/>
            </button>
          </div>
        </div>
      </div>

      <div className="max-w-7xl mx-auto px-4 md:px-5 pt-5 space-y-5">
        {/* Hazard Banner */}
        {chem.hazClass.length > 0 && (
          <div className={`rounded-xl p-4 flex gap-4 items-start border slide-up
            ${chem.hazClass.includes('tox')||chem.hazClass.includes('flam') ? 'bg-red-50 border-red-200' : 'bg-amber-50 border-amber-200'}`}>
            <div className={`p-2 rounded-lg shrink-0 ${chem.hazClass.includes('tox')||chem.hazClass.includes('flam')?'bg-red-100':'bg-amber-100'}`}>
              <Ic d={ICONS.warn} size={18} className={chem.hazClass.includes('tox')||chem.hazClass.includes('flam')?'text-red-600':'text-amber-600'}/>
            </div>
            <div className="min-w-0 flex-1">
              <div className="flex flex-wrap gap-1 mb-2">
                {chem.hazClass.map(c=><HazTag key={c} cls={c}/>)}
                {chem.heatTrace && <span className="text-[9px] font-bold px-1.5 py-0.5 rounded mono bg-orange-100 text-orange-800 border border-orange-300">{t.heatTraceRec}</span>}
              </div>
              <p className="text-sm font-bold text-slate-800 mb-1">{chem.risk[lang]}</p>
              <p className="text-xs text-slate-600 mb-1"><b>{t.pipeMat}：</b>{chem.mat[lang]}</p>
              <p className="text-xs text-slate-600 mb-1"><b>{t.incompatTitle}：</b>{chem.incompat[lang]}</p>
              <p className="text-xs text-amber-800 font-medium"><b>⚙ {t.specialReq}：</b>{chem.special[lang]}</p>
              {chem.note && <p className="text-[11px] text-slate-500 mt-1 italic">{chem.note[lang]}</p>}
            </div>
          </div>
        )}

        <div className="grid grid-cols-1 lg:grid-cols-5 gap-5">
          {/* ── Col 1-2: Inputs ── */}
          <div className="lg:col-span-2 space-y-4">
            {/* 01 Chemical & Flow */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <div className="flex items-center gap-2 mb-4">
                <span className="bg-slate-900 text-white text-xs font-bold mono px-2 py-1 rounded-lg">01</span>
                <h2 className="font-bold text-slate-800">{t.sec1Title}</h2>
              </div>
              <div className="mb-4">
                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">{t.chemType}</label>
                <select value={chemKey} onChange={e=>setChemKey(e.target.value)}
                  className="w-full p-2.5 border border-slate-200 rounded-xl text-sm font-semibold bg-white outline-none focus:border-emerald-400">
                  {Object.entries(groupedChems).map(([grp,items])=>(
                    <optgroup key={grp} label={grp}>
                      {items.map(([k,v])=><option key={k} value={k}>{v.name[lang]}</option>)}
                    </optgroup>
                  ))}
                </select>
              </div>
              <div className="mb-4 bg-slate-50 rounded-xl p-3 border border-slate-100 grid grid-cols-3 gap-2">
                {[
                  [t.sg, chem.sg.toFixed(3),"—"], [t.visc, chem.visc, "cP"], [t.vaporP,chem.vaporP.toFixed(2),"kPa(25°C)"],
                  [t.density,(chem.sg*1000).toFixed(0),"kg/m³"], [t.minVel,chem.minV,"m/s"], [t.maxVel,chem.maxVelocity,"m/s"],
                ].map(([k,v,u])=>(
                  <div key={k} className="text-center">
                    <div className="text-[9px] text-slate-400 uppercase leading-tight truncate">{k}</div>
                    <div className="mono text-sm font-bold text-slate-700">{v}</div>
                    <div className="text-[9px] text-slate-400">{u}</div>
                  </div>
                ))}
              </div>
              <div className="mb-4">
                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">{t.pipeMat}</label>
                <select value={matKey} onChange={e=>setMatKey(e.target.value)}
                  className="w-full p-2.5 border border-slate-200 rounded-xl text-sm bg-white outline-none focus:border-emerald-400">
                  {Object.entries(MATERIAL_DB).map(([k,v])=><option key={k} value={k}>{v.name} — Vmax={v.maxV}m/s</option>)}
                </select>
                {matKey !== chem.defaultMat && (
                  <p className="text-[10px] text-amber-600 mt-1 bg-amber-50 px-2 py-1 rounded border border-amber-200">
                    {t.matWarning.replace('{0}', MATERIAL_DB[chem.defaultMat]?.name)}
                  </p>
                )}
              </div>
              <div className="mb-4">
                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">{t.designFlow}</label>
                <div className="flex gap-2">
                  <input type="number" value={flowVal} onChange={e=>setFlowVal(parseFloat(e.target.value)||0)}
                    className="flex-1 p-2.5 bg-emerald-50 border border-emerald-200 focus:border-emerald-500 rounded-xl text-lg font-bold mono outline-none text-emerald-800"/>
                  <select value={qUnit} onChange={e=>{
                    const lpm = Q_UNITS[qUnit].toLPM(flowVal);
                    setQUnit(e.target.value);
                    setFlowVal(+Q_UNITS[e.target.value].fromLPM(lpm).toFixed(3));
                  }} className="w-24 p-2 border border-slate-200 rounded-xl text-xs font-bold bg-white outline-none focus:border-emerald-400">
                    {Object.entries(Q_UNITS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
                  </select>
                </div>
                <div className="mt-1 grid grid-cols-2 gap-1 text-[10px] text-slate-400 mono">
                  <span>= {flowLPM.toFixed(2)} L/min</span>
                  <span>= {Q_UNITS.m3h.fromLPM(flowLPM).toFixed(3)} m³/h</span>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">{t.opTemp}</label>
                  <div className="relative">
                    <input type="number" value={params.tempC} onChange={e=>set('tempC',parseFloat(e.target.value)||25)}
                      className="w-full p-2.5 border border-slate-200 rounded-xl text-sm mono bg-slate-50 outline-none focus:border-emerald-400"/>
                    <span className="absolute right-2 top-3 text-[10px] text-slate-400">°C</span>
                  </div>
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-red-500 uppercase mb-1.5 truncate">{t.pumpMaxP}</label>
                  <div className="relative">
                    <input type="number" step="0.5" value={params.pumpMaxPBar} onChange={e=>set('pumpMaxPBar',parseFloat(e.target.value)||6)}
                      className="w-full p-2.5 border border-red-200 rounded-xl text-sm mono bg-red-50 outline-none text-red-700 font-bold focus:border-red-400"/>
                    <span className="absolute right-2 top-3 text-[10px] text-slate-400">bar</span>
                  </div>
                </div>
              </div>
            </div>

            {/* 02 Pipe Routing */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <div className="flex items-center gap-2 mb-4">
                <span className="bg-slate-900 text-white text-xs font-bold mono px-2 py-1 rounded-lg">02</span>
                <h2 className="font-bold text-slate-800">{t.sec2Title}</h2>
              </div>
              <div className="grid grid-cols-2 gap-3 mb-4">
                <div className="col-span-2">
                  <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">{t.supplyLen}</label>
                  <div className="relative">
                    <input type="number" value={params.pipeLen} onChange={e=>set('pipeLen',parseFloat(e.target.value)||0)}
                      className="w-full p-2.5 border border-slate-200 rounded-xl text-base mono bg-slate-50 outline-none focus:border-emerald-400"/>
                    <span className="absolute right-2 top-3 text-[10px] text-slate-400">m</span>
                  </div>
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1.5">{t.elevation}</label>
                  <div className="relative">
                    <input type="number" value={params.elevation} onChange={e=>set('elevation',parseFloat(e.target.value)||0)}
                      className="w-full p-2.5 border border-slate-200 rounded-xl text-sm mono bg-slate-50 outline-none focus:border-emerald-400"/>
                    <span className="absolute right-2 top-3 text-[10px] text-slate-400">m</span>
                  </div>
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-emerald-600 uppercase mb-1.5 truncate">{t.reqP}</label>
                  <div className="relative">
                    <input type="number" step="0.1" value={params.reqPressureBar} onChange={e=>set('reqPressureBar',parseFloat(e.target.value)||0)}
                      className="w-full p-2.5 border border-emerald-200 rounded-xl text-sm mono bg-emerald-50 outline-none text-emerald-700 font-bold focus:border-emerald-400"/>
                    <span className="absolute right-2 top-3 text-[10px] text-slate-400">bar</span>
                  </div>
                </div>
              </div>
              <div className="mb-4">
                <label className="text-xs font-bold text-slate-500 uppercase mb-2 block">{t.fittingsQty}</label>
                <div className="border border-slate-100 rounded-xl overflow-hidden px-2">
                  {Object.keys(FITTING_DB).map(k=>(
                    <div key={k} className="flex items-center gap-2 py-1.5 border-b border-slate-100 last:border-0">
                      <div className="flex-1 min-w-0">
                        <p className="text-xs text-slate-600 truncate">{FITTING_DB[k].label[lang]}</p>
                        {FITTING_DB[k].note && <p className="text-[9px] text-slate-400 truncate">{FITTING_DB[k].note[lang]}</p>}
                      </div>
                      <span className="mono text-[9px] text-slate-400 w-10 text-right shrink-0">K={FITTING_DB[k].K}</span>
                      <input type="number" min="0" value={fittings[k]||0} onChange={e=>setFit(k,parseInt(e.target.value)||0)}
                        className="w-12 text-center border border-slate-200 rounded-lg px-1 py-1 text-sm mono bg-white outline-none focus:border-emerald-400"/>
                    </div>
                  ))}
                </div>
                <div className="mt-2 text-right text-xs text-slate-500 mono">ΣK = <b className="text-slate-700">{totalKDisplay.toFixed(1)}</b></div>
              </div>
              <div className="bg-slate-50 rounded-xl p-3 border border-slate-100 space-y-3">
                <p className="text-[10px] font-bold text-slate-400 uppercase flex items-center gap-1"><Ic d={ICONS.filter} size={11}/> {t.compLoss}</p>
                <div className="grid grid-cols-2 gap-2">
                  {[
                    [t.filterQty, "filterQty", 1], [t.filterDP, "filterDP", 0.3],
                    [t.valveQty, "valveQty", 0], [t.valveDP, "valveDP", 0],
                  ].map(([l,k,step])=>(
                    <div key={k}>
                      <span className="text-[9px] text-slate-500 block mb-1 truncate" title={l}>{l}</span>
                      <input type="number" step={step} value={params[k]} onChange={e=>set(k,parseFloat(e.target.value)||0)}
                        className="w-full p-1.5 border border-slate-200 rounded-lg text-sm mono text-center bg-white outline-none focus:border-emerald-400"/>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* 03 NPSH Inputs */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <div className="flex items-center gap-2 mb-3">
                <span className="bg-slate-900 text-white text-xs font-bold mono px-2 py-1 rounded-lg">03</span>
                <h2 className="font-bold text-slate-800">{t.sec3Title}</h2>
              </div>
              <p className="text-[11px] text-slate-400 mb-3">{t.npshDesc}</p>
              <div className="grid grid-cols-2 gap-3">
                {[
                  [t.suctionLen,"suctionLen","m",0.5], [t.suctionElev,"suctionElev","m",0.5], [t.tankPress,"tankPressBar","bar",0.1],
                ].map(([l,k,u,step])=>(
                  <div key={k} className={k==="tankPressBar"?"col-span-2":""}>
                    <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1 truncate" title={l}>{l}</label>
                    <div className="relative">
                      <input type="number" step={step} value={params[k]} onChange={e=>set(k,parseFloat(e.target.value)||0)}
                        className="w-full p-2 border border-slate-200 rounded-lg text-sm mono bg-slate-50 outline-none focus:border-blue-400"/>
                      <span className="absolute right-2 top-2.5 text-[10px] text-slate-400">{u}</span>
                    </div>
                  </div>
                ))}
              </div>
              {optimal && (
                <div className={`mt-3 rounded-xl p-3 border text-sm font-bold mono text-center
                  ${optimal.NPSHa>1.5?'bg-emerald-50 border-emerald-200 text-emerald-700':optimal.NPSHa>0.5?'bg-amber-50 border-amber-200 text-amber-700':'bg-red-50 border-red-200 text-red-700'}`}>
                  NPSHa = {optimal.NPSHa} m &nbsp;
                  <span className="text-xs font-normal">{optimal.NPSHa>1.5?t.npshSafe:optimal.NPSHa>0.5?t.npshWarn:t.npshDanger}</span>
                </div>
              )}
            </div>
          </div>

          {/* ── Col 3-5: Results ── */}
          <div className="lg:col-span-3 space-y-5">
            {optimal && (
              <div className="bg-slate-900 rounded-2xl overflow-hidden shadow-xl slide-up">
                <div className="px-6 py-4 border-b border-white/10 flex items-center justify-between">
                  <div className="flex items-center gap-3">
                    <span className="bg-emerald-600 text-white text-xs font-bold mono px-2 py-1 rounded-lg">04</span>
                    <h2 className="font-bold text-white">{t.sec4Title}</h2>
                  </div>
                  {overallPass
                    ? <span className="flex items-center gap-1.5 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded-full text-xs font-bold"><Ic d={ICONS.check} size={12}/> {t.pass}</span>
                    : <span className="flex items-center gap-1.5 bg-red-500/20 text-red-400 border border-red-500/30 px-3 py-1 rounded-full text-xs font-bold"><Ic d={ICONS.warn} size={12}/> {t.fail} — {warnings.filter(w=>w.sev==="err").length} {t.failCount}</span>
                  }
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2">
                  <div className="p-6 border-b md:border-b-0 md:border-r border-white/10 bg-slate-800/40">
                    <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">{t.recSizeTitle}</p>
                    <div className="flex items-baseline gap-3 mb-4">
                      <span className="text-5xl font-black text-white mono">{optimal.label.split(' ')[0]}</span>
                      <span className="text-emerald-400 text-sm font-bold bg-emerald-500/10 px-2 py-0.5 rounded">{t.optimal}</span>
                    </div>
                    <div className="mono text-xs text-slate-500 mb-4">ID = {optimal.id_mm.toFixed(1)} mm</div>
                    <div className="space-y-2 text-sm">
                      {[
                        [t.flowRegime, optimal.regimeKey==="Laminar"?t.help.s4_types[0]?.[0]||"Laminar":optimal.regimeKey, "text-blue-400"],
                        [t.reNumber, optimal.Re.toLocaleString(), "mono text-slate-300"],
                        [t.frictionF, optimal.f, "mono text-slate-300"],
                        [t.inletVel, `${optimal.v} m/s`, "mono"],
                        ["NPSHa", `${optimal.NPSHa} m`, optimal.NPSHa>1.5?"text-emerald-400":optimal.NPSHa>0.5?"text-amber-400":"text-red-400 font-bold"],
                      ].map(([k,v,cls])=>(
                        <div key={k} className="flex justify-between border-b border-white/5 pb-1.5">
                          <span className="text-slate-400">{k}</span><span className={cls}>{v}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div className="p-6 space-y-3">
                    <div className="bg-white/5 rounded-xl p-4 border border-white/10">
                      <div className="flex justify-between mb-1">
                        <span className="text-xs font-bold text-slate-400 uppercase">{t.pipeVel}</span>
                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded mono ${optimal.vSafe?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>
                          {optimal.vSafe ? '✓ OK' : '⚠ Limit'}
                        </span>
                      </div>
                      <div className="text-3xl font-black text-white mono">{optimal.v} <span className="text-sm text-slate-500">m/s</span></div>
                      <div className="mt-2 w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                        <div className="h-full rounded-full" style={{width:`${Math.min((optimal.v/Math.max(chem.minV,0.1))*50,100)}%`, background: optimal.vColor}}/>
                      </div>
                      <div className="mono text-[10px] text-slate-500 mt-1">{t.recRange} {chem.minV} ~ {chem.maxVelocity} m/s</div>
                    </div>
                    <div className="bg-white/5 rounded-xl p-4 border border-white/10">
                      <div className="flex justify-between mb-1">
                        <span className="text-xs font-bold text-slate-400 uppercase">{t.tdh}</span>
                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded mono ${optimal.pSafe?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}`}>
                          {optimal.pSafe ? t.pumpOk : t.pumpOver}
                        </span>
                      </div>
                      <div className="text-3xl font-black text-white mono">{optimal.TDH} <span className="text-sm text-slate-500">m</span></div>
                      <div className="mt-1 text-[11px] text-slate-500 mono truncate">
                        {t.pumpPOut} <span className={optimal.pSafe?"text-emerald-400":"text-red-400 font-bold"}>{optimal.P_pump_bar} bar</span> <span className="text-slate-600"> {t.upperLimit} {params.pumpMaxPBar} bar</span>
                      </div>
                    </div>
                    <div className="bg-slate-800 rounded-xl p-3 border border-white/5 text-xs mono space-y-1">
                      <p className="text-slate-400 font-bold mb-2">{t.dpBreakdown}</p>
                      {[ [t.dpFric, optimal.dp_fric], [t.dpFit, optimal.dp_fit], [t.dpElev, optimal.dp_elev], [t.dpFilter, +(optimal.dp_filter+optimal.dp_valve).toFixed(3)], [t.dpReq, optimal.dp_reqP]
                      ].map(([l,v])=>(
                        <div key={l} className="flex justify-between"><span className="text-slate-500">{l}</span><span className="text-slate-300">{v.toFixed(3)} bar</span></div>
                      ))}
                      <div className="flex justify-between border-t border-white/10 pt-1 mt-1 font-bold">
                        <span className="text-white">{t.dpTotal}</span><span className={optimal.pSafe?"text-emerald-400":"text-red-400"}>{optimal.P_pump_bar} bar</span>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="p-5 border-t border-white/10 bg-black/20">
                  <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">{t.auditLog}</p>
                  {warnings.length === 0 ? (
                    <div className="flex items-center gap-3 bg-emerald-500/10 border border-emerald-500/20 px-4 py-3 rounded-xl">
                      <Ic d={ICONS.check} size={14} className="text-emerald-400"/><span className="text-sm text-emerald-300">{t.auditPass}</span>
                    </div>
                  ) : (
                    <div className="space-y-2">
                      {warnings.map((w,i)=>(
                        <div key={i} className={`flex items-start gap-3 px-3 py-2 rounded-xl border text-xs ${w.sev==="err"?"bg-red-500/10 border-red-500/20 text-red-300":w.sev==="info"?"bg-blue-500/10 border-blue-500/20 text-blue-300":"bg-amber-500/10 border-amber-500/20 text-amber-300"}`}>
                          <Ic d={ICONS.warn} size={13} className="shrink-0 mt-0.5"/><span>{w.msg}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4">{t.chartTitle}</p>
              <div className="h-[260px]">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={chartData} margin={{top:10,right:10,left:0,bottom:0}}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                    <XAxis dataKey="label" tick={{fontSize:10,fill:'#94a3b8'}} tickLine={false} axisLine={{stroke:'#e2e8f0'}}/>
                    <YAxis tick={{fontSize:9,fill:'#64748b'}} tickLine={false} axisLine={false}/>
                    <RechartsTip contentStyle={{borderRadius:'8px',fontSize:'11px'}}/>
                    <Legend wrapperStyle={{fontSize:'10px'}}/>
                    <Bar dataKey={t.dpElev} stackId="a" fill="#6366f1"/>
                    <Bar dataKey={t.dpFric} stackId="a" fill="#3b82f6"/>
                    <Bar dataKey={t.dpFit}  stackId="a" fill="#06b6d4"/>
                    <Bar dataKey={t.dpFilter} stackId="a" fill="#f59e0b"/>
                    <Bar dataKey={t.dpReq}  stackId="a" fill="#10b981"/>
                    <ReferenceLine y={params.pumpMaxPBar*(safetyM?0.85:1.0)}
                      label={{value:`Limit ${(params.pumpMaxPBar*(safetyM?0.85:1.0)).toFixed(1)}bar`,fill:'#ef4444',fontSize:10,position:'insideTopRight'}}
                      stroke="#ef4444" strokeDasharray="3 3"/>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="px-5 py-3 border-b border-slate-100"><span className="text-xs font-bold text-slate-500 uppercase tracking-widest">{t.allSizes}</span></div>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-100">
                      {t.tblHeaders.map(h=><th key={h} className="px-3 py-2.5 text-left text-[10px] font-bold text-slate-500 uppercase">{h}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {results.map((r,i)=>(
                      <tr key={i} className={`seg-row border-b border-slate-50 ${r.isRecommended?'bg-emerald-50':''}`}>
                        <td className="px-3 py-2 font-bold mono">{r.label.split(' ')[0]}</td>
                        <td className="px-3 py-2 mono text-slate-500">{r.id_mm.toFixed(1)}</td>
                        <td className="px-3 py-2 mono font-bold" style={{color:r.vColor}}>{r.v}</td>
                        <td className="px-3 py-2 mono text-slate-500">{r.Re.toLocaleString()}</td>
                        <td className="px-3 py-2 mono text-slate-600">{r.TDH}</td>
                        <td className={`px-3 py-2 mono font-bold ${r.pSafe?'text-emerald-700':'text-red-600'}`}>{r.P_pump_bar}</td>
                        <td className={`px-3 py-2 mono font-bold ${r.NPSHa>1.5?'text-emerald-600':r.NPSHa>0.5?'text-amber-600':'text-red-600'}`}>{r.NPSHa}</td>
                        <td className="px-3 py-2 text-slate-500 text-[10px]">{r.regimeKey}</td>
                        <td className="px-3 py-2">
                          {r.isRecommended ? <span className="bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded text-[10px]">{t.statusOpt}</span>
                            : r.vSafe && r.pSafe ? <span className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[10px]">OK</span>
                            : <span className="bg-red-50 text-red-500 px-2 py-0.5 rounded text-[10px]">FAIL</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-2">
                  <Ic d={ICONS.shield} size={15} className="text-slate-500"/>
                  <span className="text-xs font-bold text-slate-600 uppercase tracking-widest">{t.matSafetyTitle} — {chem.name[lang].split(' ')[0]}</span>
                </div>
                <div className="flex gap-1">{chem.hazClass.map(c=><HazTag key={c} cls={c}/>)}</div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-3 text-xs">
                {[ [t.recMatTitle,chem.mat[lang],"blue"], [t.incompatTitle,chem.incompat[lang],"red"], [t.specialReq,chem.special[lang],"amber"],
                ].map(([title,content,color])=>(
                  <div key={title} className="bg-slate-50 rounded-xl p-3 border border-slate-100">
                    <p className={`font-bold text-${color}-700 mb-1.5 text-[10px] uppercase`}>{title}</p>
                    <p className="text-slate-600 leading-relaxed">{content}</p>
                  </div>
                ))}
              </div>
              {chem.note && (
                <div className="mt-3 bg-blue-50 rounded-lg px-3 py-2 border border-blue-100">
                  <Ic d={ICONS.info} size={12} className="text-blue-500 inline mr-1"/>
                  <span className="text-[11px] text-blue-700">{chem.note[lang]}</span>
                </div>
              )}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
