const P_UNITS = {

};

const Q_UNITS = {
  SCMH: { label:"Sm³/h",  toSCMH: v=>v,           fromSCMH: v=>v },
  SLPM: { label:"SLM",    toSCMH: v=>v*60/1000,   fromSCMH: v=>v*1000/60 },

  flammable:{ zh:"FLAMMABLE 易燃", en:"FLAMMABLE", css:"tag-flam" },
  oxidizer: { zh:"OXIDIZER 氧化劑", en:"OXIDIZER", css:"tag-oxid" },

// ─── Core Calculation Engine ──────────────────────────────────────────────────
function calcPipeline({ gasKey, pInAbs, tempC, flowSCMH, pipeLength, fittings, schedule, maxV, maxDP, safetyMargin }) {
  const gas = GASES[gasKey];
  if (!gas) return null;
  const margin = safetyMargin ? 0.8 : 1.0;
  const R_sp = C.R_UNI / gas.M;
  const tAbs = tempC + 273.15;
  const a_sonic = Math.sqrt(gas.gamma * R_sp * tAbs);
  const mDot = (flowSCMH / 3600) * gas.rhoStd;

  const totalLeD = Object.entries(fittings).reduce((sum, [key, count]) => {
    return sum + (FITTING_DEFS[key]?.leD || 0) * count;
  }, 0);

  const results = PIPE_SIZES.map(pipe => {
    const id_mm = schedule === 'sch80' ? pipe.id80 : pipe.id40;
    const D = id_mm / 1000;
    const A = Math.PI * D * D / 4;
    const relRough = C.ROUGHNESS / D;
    const G = mDot / A;
    const Re_in = (G * D) / gas.mu;

    let f;
    if (Re_in < 2000) f = 64 / Math.max(Re_in, 1);
    else f = 0.25 / Math.pow(Math.log10(relRough/3.7 + 5.74/Math.pow(Re_in,0.9)), 2);

    let pOut = pInAbs;
    let pAvg = pInAbs;
    let dpFric = 0, dpFit = 0;
    for (let i = 0; i < 20; i++) {
      pAvg = (pInAbs + pOut) / 2;
      const dyn = (G * G * R_sp * tAbs) / (2 * pAvg);
      dpFric = f * (pipeLength / D) * dyn;
      dpFit  = f * totalLeD * dyn;
      const dpNew = dpFric + dpFit;
      const pOutNew = pInAbs - dpNew;
      if (Math.abs(pOutNew - pOut) < 5 || pOutNew <= 1000 || isNaN(pOutNew)) {
        pOut = Math.max(pOutNew || 1000, 1000);
        break;
      }
      pOut = pOutNew;
    }

    const dpTot = pInAbs - pOut;
    const rhoAvg = pAvg / (R_sp * tAbs);
    const uAvg = G / rhoAvg;
    const uIn  = mDot / (A * (pInAbs / (R_sp * tAbs)));
    const uOut = pOut > 1000 ? mDot / (A * (pOut / (R_sp * tAbs))) : 999;
    const machAvg = uAvg / a_sonic;
    const dpBar = dpTot / C.BAR_TO_PA;
    const dpRatio = dpTot / pAvg;

    let reStatusKey = "Turbulent";
    if (Re_in <= 2000) reStatusKey = "Laminar";
    else if (Re_in <= 4000) reStatusKey = "Transition";

    const limitV  = gas.limitV * margin;
    const limitDP = maxDP * margin;
    const vSafe     = uAvg <= (maxV || gas.limitV) * margin;
    const pSafe     = dpBar <= limitDP;
    const machSafe  = machAvg < 0.3;
    const modelSafe = dpRatio < 0.2;

    return {
      ...pipe, id_mm,
      G, Re: Math.round(Re_in), reStatusKey, f: +f.toFixed(4),
      uAvg: +uAvg.toFixed(2), uIn: +uIn.toFixed(2), uOut: +uOut.toFixed(2),
      machAvg: +machAvg.toFixed(3),
      dpBar: +dpBar.toFixed(4), dpFricBar: +(dpFric/C.BAR_TO_PA).toFixed(4),
      dpFitBar: +(dpFit/C.BAR_TO_PA).toFixed(4),
      dpRatio: +(dpRatio*100).toFixed(1),
      pOut, pOutBar: +((pOut-C.P_STD)/C.BAR_TO_PA).toFixed(3),
      limitV, limitDP, vSafe, pSafe, machSafe, modelSafe,
      isSafe: vSafe && pSafe && machSafe && modelSafe,
      fitFrac: dpFit/(dpFric+dpFit)||0,
    };
  });

  const recommended = results.find(r => r.isSafe) || null;
  const best = recommended || results[results.length - 1];
  const graphData = results.filter(r => r.uAvg < 200 && r.uAvg > 0);

  return { results, recommended, best, graphData, totalLeD, a_sonic };
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  // i18n State setup based on URL param
  const [lang, setLang] = useState(() => {
    const params = new URLSearchParams(window.location.search);
    return params.get('lang') === 'en' ? 'en' : 'zh';
  });
  const t = i18nData[lang];

  const toggleLang = () => {
    const newLang = lang === 'zh' ? 'en' : 'zh';
    setLang(newLang);
    try {
      const url = new URL(window.location);
      url.searchParams.set('lang', newLang);
      window.history.pushState({}, '', url);
    } catch (error) {
      console.warn("無法在此預覽環境中更新網址參數 (沙盒/Blob限制):", error);
    }
  };

  const [showHelp, setShowHelp] = useState(false);
  const [safetyMargin, setSafetyMargin] = useState(false);
  const [pUnit, setPUnit] = useState('bar');
  const [qUnit, setQUnit] = useState('SCMH');
  const [schedule, setSchedule] = useState('sch40');

  const [form, setForm] = useState({
    gasKey: 'GN2', pressureVal: 8.0, tempC: 25, flowVal: 20000,
    pipeLength: 300, minDeliveryPBar: 4.0, maxAllowedDPBar: 0.5, maxVelocityOverride: 0,
    fittings: { elbow90sr: 8, elbow90lr: 0, elbow45: 2, teeRun: 3, teeBranch: 1, gateValve: 6, globeValve: 0, checkValve: 2, filter: 1 },
  });

  const set = useCallback((key, val) => setForm(f => ({...f, [key]: val})), []);
  const setFit = useCallback((key, val) => setForm(f => ({...f, fittings:{...f.fittings, [key]:val}})), []);

  const gas = GASES[form.gasKey];
  const pInAbs = P_UNITS[pUnit].toPA(form.pressureVal);
  const flowSCMH = Q_UNITS[qUnit].toSCMH(form.flowVal);
  const maxV = form.maxVelocityOverride > 0 ? form.maxVelocityOverride : gas.limitV;

  const calc = useMemo(() => calcPipeline({
    gasKey: form.gasKey, pInAbs, tempC: form.tempC, flowSCMH, pipeLength: form.pipeLength,
    fittings: form.fittings, schedule, maxV, maxDP: form.maxAllowedDPBar, safetyMargin,
  }), [form, schedule, safetyMargin, pInAbs, flowSCMH, maxV]);

  if (!calc) return null;
  const { recommended, best, graphData, totalLeD } = calc;

  const pOutBarG = best.pOutBar;
  const deliveryOK = pOutBarG >= form.minDeliveryPBar;

  const flowSLM = Q_UNITS.SLPM.fromSCMH(flowSCMH);
  const flowSCFM = Q_UNITS.SCFM.fromSCMH(flowSCMH);
  const pOutPsig = (best.pOut - C.P_STD) / C.PSI_TO_PA;

  const failReasons = [];
  if (!best.vSafe) failReasons.push(t.failReasons.vel(best.uAvg, best.limitV.toFixed(1)));
  if (!best.pSafe) failReasons.push(t.failReasons.dp(best.dpBar, best.limitDP.toFixed(2)));
  if (!best.machSafe) failReasons.push(t.failReasons.mach(best.machAvg));
  if (!best.modelSafe) failReasons.push(t.failReasons.model(best.dpRatio));
  if (!deliveryOK) failReasons.push(t.failReasons.pout(pOutBarG.toFixed(2), form.minDeliveryPBar));

  return (
    <div className="min-h-screen bg-slate-100 pb-16">

            <div className="bg-blue-600 rounded-xl p-2.5">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
            </div>
            <div>
              <div className="flex items-center gap-2">
                <span className="font-bold text-lg tracking-tight">{t.appTitle}</span>
                <span className="bg-blue-600 text-white text-[10px] font-bold px-2 py-0.5 rounded mono">v2.0</span>
              </div>
              <p className="text-slate-400 text-xs mt-0.5">{t.appDesc}</p>
            </div>
          </div>
          <div className="flex items-center gap-3 no-print">
            <button onClick={toggleLang} className="flex items-center gap-2 px-3 py-2 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 text-slate-400 hover:text-white transition text-xs font-bold">
              <Ic d={ICONS.globe} size={14}/> {lang === 'zh' ? 'English' : '中文'}
            </button>
            <button onClick={() => setSafetyMargin(!safetyMargin)}
              className={`flex items-center gap-2 px-3 py-2 rounded-xl border text-xs font-bold transition-all
                ${safetyMargin ? 'bg-blue-500/20 border-blue-400/50 text-blue-200' : 'bg-white/5 border-white/10 text-slate-400 hover:bg-white/10'}`}>
              <Ic d={ICONS.shield} size={14} className={safetyMargin?"text-blue-400":"text-slate-500"}/>
              {safetyMargin ? t.safetyMarginOn : t.safetyMarginOff}

                  }} className="w-28 p-2 border border-slate-200 rounded-xl text-sm font-bold bg-white outline-none">
                    {Object.entries(P_UNITS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                </div>
              </div>
              <div className="mb-4">
                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">{t.tempLabel}</label>
                <div className="relative">
                  <input type="number" value={form.tempC} onChange={e => set('tempC', parseFloat(e.target.value)||0)}
                    className="w-full p-2.5 border border-slate-200 rounded-xl text-lg mono bg-slate-50 outline-none"/>
                  <span className="absolute right-3 top-3 text-xs text-slate-400 font-bold">°C</span>
                </div>
              </div>
              <div>
                <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">{t.flowLabel}</label>
                <div className="flex gap-2">
                  <input type="number" value={form.flowVal} onChange={e => set('flowVal', parseFloat(e.target.value)||0)}
                    className="flex-1 p-2.5 bg-blue-50 border border-blue-200 focus:border-blue-500 rounded-xl text-lg font-bold mono outline-none text-blue-700"/>
                  <select value={qUnit} onChange={e => {
                    const scmh = Q_UNITS[qUnit].toSCMH(form.flowVal);
                    const newUnit = e.target.value;
                    set('flowVal', +Q_UNITS[newUnit].fromSCMH(scmh).toFixed(2)); setQUnit(newUnit);
                  }} className="w-20 p-2 border border-slate-200 rounded-xl text-sm font-bold bg-white outline-none">
                    {Object.entries(Q_UNITS).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                  </select>
                </div>
                <div className="mt-1.5 grid grid-cols-3 gap-1 text-[10px] text-slate-400 mono">
                  <span>= {flowSLM.toFixed(0)} SLM</span>
                  <span>= {flowSCMH.toFixed(1)} Sm³/h</span>
                  <span>= {flowSCFM.toFixed(1)} SCFM</span>
                </div>
              </div>
            </div>

            {/* Section 02 */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <div className="flex items-center gap-2 mb-4">
                <span className="bg-slate-900 text-white text-xs font-bold mono px-2 py-1 rounded-lg">02</span>
                <h2 className="font-bold text-slate-800">{t.sec2Title}</h2>
              </div>
              <div className="grid grid-cols-2 gap-3 mb-4">
                <div className="col-span-2">
                  <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">{t.pipeLength}</label>
                  <div className="relative">
                    <input type="number" value={form.pipeLength} onChange={e => set('pipeLength', parseFloat(e.target.value)||0)} className="w-full p-2.5 border border-slate-200 rounded-xl text-lg mono bg-slate-50 outline-none"/>
                    <span className="absolute right-3 top-3 text-xs text-slate-400 font-bold">m</span>
                  </div>
                </div>
                <div className="col-span-2">
                  <label className="block text-xs font-bold text-slate-500 uppercase mb-1.5">{t.pipeSchedule}</label>
                  <div className="grid grid-cols-2 gap-2">
                    {[['sch40','Sch 40 (Standard)'],['sch80','Sch 80 (Heavy Wall)']].map(([v,l]) => (
                      <button key={v} onClick={() => setSchedule(v)} className={`py-2 rounded-xl text-xs font-bold border transition-all ${schedule===v ? 'bg-slate-800 text-white border-slate-800' : 'bg-white text-slate-500 border-slate-200 hover:border-slate-400'}`}>{l}</button>
                    ))}
                  </div>
                </div>
              </div>
              <div className="mb-4">
                <label className="text-xs font-bold text-slate-500 uppercase mb-2 block">{t.fittingsQty}</label>
                <div className="border border-slate-100 rounded-xl overflow-hidden">
                  {Object.keys(FITTING_DEFS).map(k => {
                    const def = FITTING_DEFS[k];
                    return (
                      <div key={k} className="flex items-center gap-3 py-1.5 border-b border-slate-100 last:border-0 px-2">
                        <div className="w-2 h-2 rounded-full shrink-0" style={{ background: def.color }}/>
                        <span className="flex-1 text-xs text-slate-600 truncate" title={def.name[lang]}>{def.name[lang]}</span>
                        <span className="mono text-[10px] text-slate-400 w-12 text-right">Le/D={def.leD}</span>
                        <input type="number" min="0" value={form.fittings[k]||0} onChange={e => setFit(k, parseInt(e.target.value)||0)} className="w-14 text-center border border-slate-200 rounded-lg px-1 py-1 text-sm mono bg-white outline-none"/>
                      </div>
                    )
                  })}
                </div>
                <div className="mt-2 text-right text-xs text-slate-500 mono">
                  {t.totalLeD} <b className="text-slate-700">{totalLeD}</b>
                </div>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-[10px] font-bold text-blue-600 uppercase mb-1.5 truncate">{t.maxVelOverride}</label>
                  <div className="relative">
                    <input type="number" step="1" value={form.maxVelocityOverride||gas.limitV} onChange={e => set('maxVelocityOverride', parseFloat(e.target.value)||0)} className="w-full p-2.5 border border-blue-200 rounded-xl text-base font-bold mono text-blue-700 bg-blue-50 outline-none"/>
                    <span className="absolute right-2 top-3 text-[10px] text-slate-400">m/s</span>
                  </div>
                  <p className="text-[10px] text-slate-400 mt-0.5">{t.gasDefault}: {gas.limitV} m/s</p>
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-red-600 uppercase mb-1.5 truncate">{t.maxAllowedDP}</label>
                  <div className="relative">
                    <input type="number" step="0.05" value={form.maxAllowedDPBar} onChange={e => set('maxAllowedDPBar', parseFloat(e.target.value)||0)} className="w-full p-2.5 border border-red-200 rounded-xl text-base font-bold mono text-red-700 bg-red-50 outline-none"/>
                    <span className="absolute right-2 top-3 text-[10px] text-slate-400">bar</span>
                  </div>
                </div>
                <div className="col-span-2">
                  <label className="block text-xs font-bold text-emerald-600 uppercase mb-1.5">{t.minDeliveryP}</label>
                  <div className="relative">
                    <input type="number" step="0.1" value={form.minDeliveryPBar} onChange={e => set('minDeliveryPBar', parseFloat(e.target.value)||0)} className="w-full p-2.5 border border-emerald-200 rounded-xl text-base font-bold mono text-emerald-700 bg-emerald-50 outline-none"/>
                    <span className="absolute right-2 top-3 text-[10px] text-slate-400">bar(g)</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          {/* ── Col 3-5: Results ── */}
          <div className="lg:col-span-3 space-y-5">
            {/* Result Panel */}
            <div className="bg-slate-900 rounded-2xl overflow-hidden shadow-xl slide-up">
              <div className="px-6 py-4 border-b border-white/10 flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <span className="bg-blue-600 text-white text-xs font-bold mono px-2 py-1 rounded-lg">03</span>
                  <h2 className="font-bold text-white">{t.sec3Title}</h2>
                </div>
                <div className="flex items-center gap-2">
                  {(recommended && deliveryOK)
                    ? <span className="flex items-center gap-1.5 bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 px-3 py-1 rounded-full text-xs font-bold"><Ic d={ICONS.check} size={13}/> {t.pass}</span>
                    : <span className="flex items-center gap-1.5 bg-red-500/20 text-red-400 border border-red-500/30 px-3 py-1 rounded-full text-xs font-bold"><Ic d={ICONS.warn} size={13}/> {t.fail}</span>
                  }
                </div>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-2">
                <div className="p-6 border-b md:border-b-0 md:border-r border-white/10 bg-slate-800/50">
                  <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">{t.recSizeTitle}</p>
                  <div className="flex items-baseline gap-3 mb-3">
                    <span className="text-5xl font-black text-white mono">{best.label}</span>
                    {recommended && <span className="text-emerald-400 text-sm font-bold bg-emerald-500/10 px-2 py-0.5 rounded">{t.optimal}</span>}
                  </div>
                  <div className="mono text-xs text-slate-500 mb-3">
                    ID = {best.id_mm.toFixed(1)} mm ({schedule.toUpperCase()})
                  </div>
                  <div className="space-y-2 text-sm">
                    {[
                      [t.flowRegime, t.reStatusMap[best.reStatusKey], best.reStatusKey==='Turbulent'?'text-blue-400':'text-amber-400'],
                      [t.reNumber, best.Re.toLocaleString(), "text-slate-300 mono"],
                      [t.frictionF, best.f, "text-slate-300 mono"],
                      [t.machAvg, best.machAvg, best.machSafe?'text-slate-300 mono':'text-red-400 mono font-bold'],
                      [t.inletVel, `${best.uIn} m/s`, "text-slate-300 mono"],
                      [t.avgVel, `${best.uAvg} m/s`, "text-slate-300 mono"],
                      [t.outletVel,`${best.uOut} m/s`, "text-slate-300 mono"],
                    ].map(([k,v,cls]) => (
                      <div key={k} className="flex justify-between items-center border-b border-white/5 pb-1.5">
                        <span className="text-slate-400">{k}</span><span className={cls}>{v}</span>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="p-6 space-y-4">
                  <div className="bg-white/5 rounded-xl p-4 border border-white/10">
                    <div className="flex justify-between mb-1">
                      <span className="text-xs font-bold text-slate-400 uppercase">{t.avgVelocityTitle}</span>
                      <span className={`inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded mono ${best.vSafe ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{best.vSafe ? `✓ ${t.pass}` : `✗ ${t.fail}`}</span>
                    </div>
                    <div className="text-3xl font-black text-white mono">{best.uAvg} <span className="text-sm text-slate-500">m/s</span></div>
                    <div className="mt-2 w-full bg-slate-700 h-1.5 rounded-full overflow-hidden">
                      <div className={`h-full rounded-full transition-all ${best.vSafe?'bg-blue-500':'bg-red-500'}`} style={{width:`${Math.min((best.uAvg/best.limitV)*100,100)}%`}}/>
                    </div>
                    <div className="text-[10px] text-slate-500 mt-1 mono text-right">{t.limit} {best.limitV.toFixed(1)} m/s</div>
                  </div>

                  <div className="bg-white/5 rounded-xl p-4 border border-white/10">
                    <div className="flex justify-between mb-1">
                      <span className="text-xs font-bold text-slate-400 uppercase">{t.pressureDropTitle}</span>
                      <span className={`inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded mono ${best.pSafe ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{best.pSafe ? `✓ ${t.pass}` : `✗ ${t.fail}`}</span>
                    </div>
                    <div className="text-3xl font-black text-white mono">{best.dpBar.toFixed(3)} <span className="text-sm text-slate-500">bar</span></div>
                    <div className="mt-1 text-xs text-slate-500 mono">
                      {t.pipeFricDetail}: {best.dpFricBar.toFixed(3)} | {t.fitFricDetail}: {best.dpFitBar.toFixed(3)}
                      <span className="ml-2 text-slate-600">({(best.fitFrac*100).toFixed(0)}% {t.fromFittings})</span>
                    </div>
                    <div className="mt-1 text-[10px] text-slate-500 mono">ΔP/P_avg = {best.dpRatio}% {best.modelSafe?'':'⚠ >20%'}</div>
                  </div>

                  <div className={`rounded-xl p-4 border ${deliveryOK?'bg-emerald-500/10 border-emerald-500/30':'bg-red-500/10 border-red-500/30'}`}>
                    <div className="flex justify-between mb-1">
                      <span className="text-xs font-bold text-slate-400 uppercase">{t.outletPressureTitle}</span>
                      <span className={`inline-flex items-center gap-1 text-[10px] font-bold px-2 py-0.5 rounded mono ${deliveryOK ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`}>{deliveryOK ? `✓ ${t.deliveryOk}` : `✗ ${t.deliveryFail}`}</span>
                    </div>
                    <div className={`text-3xl font-black mono ${deliveryOK?'text-emerald-400':'text-red-400'}`}>
                      {pOutBarG.toFixed(3)} <span className="text-sm text-slate-500">bar(g)</span>
                    </div>
                    <div className="mono text-[10px] text-slate-400 mt-1">
                      = {pOutPsig.toFixed(1)} psig &nbsp;|&nbsp; {t.minReq} {form.minDeliveryPBar} bar(g)
                    </div>
                  </div>
                </div>
              </div>

              <div className="p-5 border-t border-white/10 bg-black/20">
                <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-3">{t.auditLogTitle}</p>
                {failReasons.length === 0 ? (
                  <div className="flex items-center gap-3 bg-emerald-500/10 border border-emerald-500/20 px-4 py-3 rounded-xl">
                    <Ic d={ICONS.check} size={15} className="text-emerald-400 shrink-0"/>
                    <span className="text-sm text-emerald-300">{t.auditPassMsg}</span>
                  </div>
                ) : (
                  <div className="space-y-2">
                    {failReasons.map((r,i) => (
                      <div key={i} className="flex items-center gap-3 bg-red-500/10 border border-red-500/20 px-3 py-2 rounded-xl">
                        <Ic d={ICONS.warn} size={13} className="text-red-400 shrink-0"/><span className="text-xs text-red-300">{r}</span>
                      </div>
                    ))}
                  </div>
                )}
                {best.fitFrac > 0.4 && (
                  <div className="mt-2 flex items-center gap-3 bg-amber-500/10 border border-amber-500/20 px-3 py-2 rounded-xl">
                    <Ic d={ICONS.bulb} size={13} className="text-amber-400 shrink-0"/><span className="text-xs text-amber-300">{t.suggestions.fitFrac((best.fitFrac*100).toFixed(0))}</span>
                  </div>
                )}
                {!best.modelSafe && (
                  <div className="mt-2 flex items-center gap-3 bg-amber-500/10 border border-amber-500/20 px-3 py-2 rounded-xl">
                    <Ic d={ICONS.bulb} size={13} className="text-amber-400 shrink-0"/><span className="text-xs text-amber-300">{t.suggestions.modelLimit}</span>
                  </div>
                )}
              </div>
            </div>

            {/* System Curve Chart */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-4 flex items-center gap-2">
                <Ic d={ICONS.result} size={14} className="text-blue-500"/>{t.sysCurveTitle}
              </p>
              <div className="h-[260px]">
                <ResponsiveContainer width="100%" height="100%">
                  <LineChart data={graphData}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9"/>
                    <XAxis dataKey="label" tick={{fontSize:9,fill:'#94a3b8'}} tickLine={false} axisLine={{stroke:'#e2e8f0'}}/>
                    <YAxis yAxisId="v" tick={{fontSize:9,fill:'#3b82f6'}} tickLine={false} axisLine={false} label={{value:`${t.velAxis} (m/s)`,angle:-90,position:'insideLeft',fontSize:9,fill:'#3b82f6'}}/>
                    <YAxis yAxisId="dp" orientation="right" tick={{fontSize:9,fill:'#ef4444'}} tickLine={false} axisLine={false} label={{value:`${t.dpAxis} (bar)`,angle:90,position:'insideRight',fontSize:9,fill:'#ef4444'}}/>
                    <RechartsTip contentStyle={{borderRadius:'8px',fontSize:'11px',border:'1px solid #e2e8f0'}}/>
                    <Legend wrapperStyle={{fontSize:'10px'}}/>
                    <Line yAxisId="v" type="monotone" dataKey="uAvg" name={`${t.velAxis} (m/s)`} stroke="#3b82f6" strokeWidth={2.5} dot={{r:3,fill:'#fff',strokeWidth:2}} activeDot={{r:5}}/>
                    <Line yAxisId="dp" type="monotone" dataKey="dpBar" name={`${t.dpAxis} (bar)`} stroke="#ef4444" strokeWidth={2} strokeDasharray="5 5" dot={false}/>
                    <Line yAxisId="v" type="step" dataKey="limitV" name={t.velLimitLine} stroke="#94a3b8" strokeDasharray="2 2" dot={false} strokeWidth={1}/>
                    {recommended && <ReferenceLine yAxisId="v" x={recommended.label} stroke="#10b981" strokeDasharray="3 3" label={{value:'Opt',position:'top',fontSize:9,fill:'#10b981'}}/>}
                  </LineChart>
                </ResponsiveContainer>
              </div>
            </div>

            {/* All Pipe Sizes Table */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
              <div className="px-5 py-3 border-b border-slate-100 flex items-center gap-2">
                <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">{t.allSizesTitle}</span>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="bg-slate-50 border-b border-slate-100">
                      {t.tblHeaders.map(h => <th key={h} className="px-3 py-2.5 text-left text-[10px] font-bold text-slate-500 uppercase tracking-wide">{h}</th>)}
                    </tr>
                  </thead>
                  <tbody>
                    {calc.results.map((r,i) => (
                      <tr key={i} className={`seg-row border-b border-slate-50 ${r.isSafe ? '' : 'opacity-60'} ${recommended?.label===r.label?'bg-emerald-50 opacity-100':''}`}>
                        <td className="px-3 py-2 font-bold mono text-slate-800">{r.label}</td>
                        <td className="px-3 py-2 mono text-slate-600">{r.id_mm.toFixed(1)}</td>
                        <td className={`px-3 py-2 mono font-bold ${r.vSafe?'text-slate-700':'text-red-600'}`}>{r.uAvg}</td>
                        <td className="px-3 py-2 mono text-slate-600">{r.Re.toLocaleString()}</td>
                        <td className={`px-3 py-2 mono ${r.machSafe?'text-slate-600':'text-red-600 font-bold'}`}>{r.machAvg}</td>
                        <td className={`px-3 py-2 mono font-bold ${r.pSafe?'text-slate-700':'text-red-600'}`}>{r.dpBar.toFixed(3)}</td>
                        <td className={`px-3 py-2 mono font-bold ${r.pOutBar>=form.minDeliveryPBar?'text-emerald-700':'text-red-600'}`}>{r.pOutBar.toFixed(2)}</td>
                        <td className="px-3 py-2 mono text-slate-500">{r.f}</td>
                        <td className="px-3 py-2">
                          {r.isSafe ? recommended?.label===r.label ? <span className="bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded text-[10px]">{t.statusOpt}</span> : <span className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[10px]">{t.statusOk}</span> : <span className="bg-red-50 text-red-500 px-2 py-0.5 rounded text-[10px]">{t.statusFail}</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>

            {/* Material & Safety Card */}
            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
              <div className="flex items-center justify-between mb-4">
                <div className="flex items-center gap-2">
                  <Ic d={ICONS.shield} size={16} className="text-slate-600"/>
                  <span className="text-xs font-bold text-slate-600 uppercase tracking-widest">{t.matSafetyTitle} — {gas.name[lang].split('—')[0]}</span>
                </div>
                <span className={`text-[10px] font-bold px-2 py-0.5 rounded mono ${HAZARD_MAP[gas.hazardClass].css}`}>{HAZARD_MAP[gas.hazardClass][lang]}</span>
              </div>
              <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-xs">
                <div className="bg-slate-50 rounded-xl p-3 border border-slate-100">
                  <p className="font-bold text-slate-700 mb-1.5 flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-blue-500 inline-block"/>{t.recMaterial}</p>
                  <p className="text-slate-600 leading-relaxed">{gas.material[lang]}</p>
                </div>
                <div className="bg-slate-50 rounded-xl p-3 border border-slate-100">
                  <p className="font-bold text-slate-700 mb-1.5 flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-amber-500 inline-block"/>{t.cleanReq}</p>
                  <p className="text-slate-600 leading-relaxed">{gas.cleaning[lang]}</p>
                </div>
                <div className="bg-slate-50 rounded-xl p-3 border border-slate-100">
                  <p className="font-bold text-slate-700 mb-1.5 flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full bg-red-500 inline-block"/>{t.safetyNotes}</p>
                  <p className="text-slate-600 leading-relaxed">{gas.hazardNote[lang]}</p>
                </div>
              </div>
              {gas.codeRef && (
                <div className="mt-3 bg-blue-50 rounded-lg px-3 py-2 border border-blue-100 flex items-center gap-2">
                  <Ic d={ICONS.book} size={13} className="text-blue-500 shrink-0"/>
                  <span className="text-[11px] text-blue-700 mono">{t.designCodes} {gas.codeRef}</span>
                </div>
              )}
            </div>

          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
