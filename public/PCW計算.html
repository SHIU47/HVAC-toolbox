                                {isLocked && <Icon name="Lock" size={12} className="opacity-70"/>}
                            </button>
                            <button onClick={() => window.print()} className="px-6 py-2 bg-slate-800 hover:bg-slate-900 text-white rounded shadow-sm text-sm font-bold flex items-center gap-2">
                                <Icon name="Printer" size={16}/> {t.btnPrint}
                            </button>
                        </div>
                    </Modal>

                    {/* Unlock Modal */}
                    <Modal isOpen={showUnlockModal} onClose={() => { setShowUnlockModal(false); setUnlockError(false); setPasswordInput(""); setPendingAction(null); }} title={t.modals.unlockTitle}>
                        <div className="space-y-4">
                            <div className="bg-amber-50 p-3 rounded text-xs text-amber-800 border border-amber-200">
                                <p className="font-bold mb-1">{t.modals.whyPwd}</p>
                                <p>{t.modals.whyPwdDesc}</p>
                            </div>
                            <p className="text-sm text-slate-600 font-bold">{t.modals.enterPwd}</p>
                            <input type="password" value={passwordInput} onChange={(e) => { setPasswordInput(e.target.value); setUnlockError(false); }} onKeyDown={(e) => e.key === 'Enter' && attemptUnlock()} className="w-full border p-2 rounded outline-none font-mono focus:border-blue-500" placeholder="Password" autoFocus/>
                            {unlockError && <p className="text-xs text-red-500 font-bold">{t.modals.pwdErr}</p>}
                            <div className="flex justify-end gap-2"><button onClick={() => { setShowUnlockModal(false); setPendingAction(null); }} className="px-4 py-2 text-slate-500 text-sm">{t.modals.cancel}</button><button onClick={attemptUnlock} className="px-4 py-2 bg-blue-600 text-white text-sm rounded">{t.modals.confirm}</button></div>
                        </div>
                    </Modal>

                    {/* Help Modal */}
                    <Modal isOpen={showHelpModal} onClose={() => setShowHelpModal(false)} title={t.modals.helpTitle} wide>
                        <div className="flex flex-col h-[500px]">
                            <div className="flex border-b border-slate-200 mb-4 gap-4">
                                <button onClick={() => setHelpTab('quick')} className={`pb-2 text-sm font-bold border-b-2 transition ${helpTab === 'quick' ? 'border-blue-500 text-blue-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>{t.modals.workflow}</button>
                                <button onClick={() => setHelpTab('npsh')} className={`pb-2 text-sm font-bold border-b-2 transition ${helpTab === 'npsh' ? 'border-amber-500 text-amber-600' : 'border-transparent text-slate-400 hover:text-slate-600'}`}>{t.modals.npsh}</button>
                            </div>
                            
                            <div className="overflow-y-auto flex-1 pr-2">
                                {helpTab === 'quick' && (
                                    <div className="space-y-6 text-sm text-slate-600">
                                        <section>
                                            <h4 className="font-bold text-slate-800 mb-2 border-b pb-1">操作流程教學</h4>
                                            <div className="space-y-4">
                                                <div>
                                                    <h5 className="font-bold text-blue-600 mb-1">Step 1: 基礎設定 (Demand)</h5>
                                                    <p className="text-slate-600 ml-4 mb-2">設定流體類型（水/乙二醇）、供水溫度與設計溫差。在下方新增區域並輸入流量，系統會自動計算總熱負荷。</p>
                                                </div>
                                                
                                                <div>
                                                    <h5 className="font-bold text-blue-600 mb-1">Step 2: 互動選型 (Equipment)</h5>
                                                    <p className="text-slate-600 ml-4 mb-2">點擊上方 P&ID 圖面中的元件圖示（如泵浦、過濾器），畫面會自動跳轉至對應的參數設定卡片。</p>
                                                    <ul className="list-disc ml-8 text-xs text-slate-500 space-y-1">
                                                        <li><strong>泵浦：</strong> 輸入「樓高/靜揚程」以精確計算總揚程。</li>
                                                        <li><strong>過濾器：</strong> 系統預設採用大流量濾心（High Flow），自動計算所需支數。</li>
                                                        <li><strong>板熱：</strong> 雙熱源設計 (CWS + CHW)，可調整趨近溫度與材質。</li>
                                                    </ul>
                                                </div>

                                                <div>
                                                    <h5 className="font-bold text-blue-600 mb-1">Step 3: 規格產出 (RFQ)</h5>
                                                    <p className="text-slate-600 ml-4">點擊右上角「詢價單」按鈕，預覽專業規格書。輸入密碼即可下載 Excel 報表。</p>
                                                </div>
                                            </div>
                                        </section>

                                        <section className="pt-4 border-t border-slate-100">
                                            <h4 className="font-bold text-slate-800 mb-2">v6.9 新功能介紹</h4>
                                            <ul className="list-disc pl-8 space-y-1 text-xs">
                                                <li><strong>版面整齊化：</strong> 改為雙欄寬版佈局，操作更舒適。</li>
                                                <li><strong>廠商規格整合：</strong> 濾心選型現在自動導入 FILTRAFINE 等級大流量濾心計算邏輯。</li>
                                                <li><strong>流量顯示：</strong> 修正安全係數顯示問題，優化設計流量顯示。</li>
                                            </ul>
                                        </section>
                                    </div>
                                )}
                                {helpTab === 'npsh' && (
                                    <div className="space-y-4 text-sm">
                                        <div className="bg-slate-100 p-4 rounded font-mono text-xs">
                                            NPSHa = Patm + Hz - Hf - Pvp
                                        </div>
                                       <p>當選擇「開放式系統 (Open System)」時，泵浦吸入口與大氣相通，需特別注意氣蝕 (Cavitation) 風險。</p>
                                            <ul className="list-disc ml-4 space-y-1">
                                                <li><strong>Patm (大氣壓)：</strong> 標準為 10.33m (水柱高)。</li>
                                                <li><strong>Hz (靜壓頭)：</strong> 水箱液面高於泵浦吸入口的高度 (正值)。</li>
                                                <li><strong>Hf (吸入損失)：</strong> 吸入管段的摩擦損失。</li>
                                                <li><strong>Pvp (飽和蒸氣壓)：</strong> 水溫越高，Pvp 越高，NPSHa 越低 (越危險)。</li>
                                            </ul>
                                            <p className="mt-2 font-bold text-slate-800">判定標準：</p>
                                            <ul className="list-disc ml-4 space-y-1">
                                                <li><span className="text-green-600 font-bold">Safe:</span> NPSHa > 3m</li>
                                                <li><span className="text-red-600 font-bold">Risk:</span> NPSHa &lt; 3m (建議提高水箱高度或加大吸入管徑)</li>
                                            </ul>
                                        </div>
                                )}
                            </div>
                        </div>
                    </Modal>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PCWEstimator />);
    </script>
</body>
</html>
