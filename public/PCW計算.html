        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* 動畫效果 */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes highlightPulse { 
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); border-color: #3b82f6; } 
            70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); border-color: #3b82f6; } 
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } 
        }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        .animate-slide-in { animation: slideIn 0.3s ease-out forwards; }
        .card-highlight { animation: highlightPulse 1.5s ease-out infinite; }

        /* P&ID Flow Animation */
        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }
        .flow-line {
            stroke-dasharray: 5;
            animation: dash 0.5s linear infinite;
        }
        .flow-line-slow {
            stroke-dasharray: 5;
            animation: dash 1s linear infinite;
        }

        /* 滾動條美化 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* 列印優化 */
        @media print {
            body { background: white; -webkit-print-color-adjust: exact; }
            .no-print { display: none !important; }
            .page-break { page-break-before: always; }
            .print-shadow-none { box-shadow: none !important; border: 1px solid #e2e8f0; }
            .rfq-paper { box-shadow: none !important; border: none !important; padding: 0 !important; width: 100% !important; }
        }

                    <svg viewBox="0 0 680 255" className="w-full h-52 md:h-72">

                            <path d={`M ${tankX+40} ${tankY+50} L ${tankX+40} ${pumpY} L ${pumpX-20} ${pumpY}`} stroke="#ef4444" strokeWidth="3" className="flow-line-slow" />
                        )}
                        <path d={`M ${pumpX+20} ${pumpY} L ${filterX-20} ${filterY}`} stroke="#3b82f6" strokeWidth="3" className="flow-line" />
                        <path d={`M ${filterX+20} ${filterY} L ${pheX-40} ${pheY}`} stroke="#3b82f6" strokeWidth="3" className="flow-line" />
                        <path d={`M ${pheX+40} ${pheY} L ${loadX-30} ${loadY}`} stroke="#3b82f6" strokeWidth="3" className="flow-line" />
                        {isClosed ? (
                            <path d={`M ${loadX+30} ${loadY} L ${loadX+50} ${loadY} L ${loadX+50} ${220} L ${50} ${220} L ${50} ${pumpY} L ${pumpX-20} ${pumpY}`} stroke="#ef4444" strokeWidth="3" fill="none" className="flow-line-slow" />
                        ) : (

                        )}

                        {/* --- ISA INSTRUMENT TAGS --- */}
                        {/* FI-101: Flow on supply line (between pump & filter) */}
                        <ITag x={240} y={128} tag="FI-101" val={`${fmtFlow} m³/h`} color="#22d3ee" />
                        {/* TI-101: Supply temp (between PHE & load) */}
                        <ITag x={514} y={128} tag="TI-101" val={`${supplyTemp}°C`} color="#34d399" />
                        {/* TI-102: Return temp on return pipe */}
                        <ITag x={470} y={238} tag="TI-102" val={`${returnTemp}°C`} color="#f87171" lineUp={true} />
                        {/* PI-101: Pump discharge pressure label */}
                        <text x={198} y={193} textAnchor="middle" fill="#fbbf24" fontSize="7" fontWeight="bold">PI-101</text>
                        <text x={198} y={203} textAnchor="middle" fill="#e2e8f0" fontSize="6">{fmtHead}m</text>

                        {/* --- COMPONENTS --- */}
                        <InteractiveGroup type="pump" x={pumpX} y={pumpY}>
                            <circle cx="0" cy="0" r="20" fill="#10b981" stroke="white" strokeWidth="2"/>
                            <path d="M -10 10 L 15 0 L -10 -10 Z" fill="white"/>
                            <text x="0" y="35" textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">PUMP</text>
                        </InteractiveGroup>

                        <InteractiveGroup type="filter" x={filterX} y={filterY}>
                            <path d="M -15 -20 L 15 -20 L 0 20 Z" fill="#f59e0b" stroke="white" strokeWidth="2"/>
                            <line x1="0" y1="-20" x2="0" y2="20" stroke="white" strokeWidth="1"/>
                            <text x="0" y="35" textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">FILTER</text>
                        </InteractiveGroup>

                        <InteractiveGroup type="phe" x={pheX} y={pheY}>
                            <rect x="-40" y="-35" width="80" height="70" rx="4" fill="#1e293b" stroke="#3b82f6" strokeWidth="2" />
                            <path d="M -20 -35 L -20 35 M 0 -35 L 0 35 M 20 -35 L 20 35" stroke="#334155" strokeWidth="1" />
                            <text x="0" y="50" textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">PHE (Dual)</text>
                            <path d="M -20 -35 L -20 -60" stroke="#22d3ee" strokeWidth="2" strokeDasharray="3 3" />
                            <text x="-20" y="-65" textAnchor="middle" fill="#22d3ee" fontSize="8" fontWeight="bold">CHW</text>
                            <path d="M 20 -35 L 20 -60" stroke="#2dd4bf" strokeWidth="2" strokeDasharray="3 3" />
                            <text x="20" y="-65" textAnchor="middle" fill="#2dd4bf" fontSize="8" fontWeight="bold">CWS</text>
                        </InteractiveGroup>

                        <g transform={`translate(${loadX}, ${loadY})`}>
                            <rect x="-30" y="-25" width="60" height="50" fill="#64748b" stroke="white" strokeWidth="2"/>
                            <text x="0" y="5" textAnchor="middle" fill="white" fontSize="10" fontWeight="bold">FAB LOAD</text>
                            <text x="0" y="40" textAnchor="middle" fill="#cbd5e1" fontSize="8">{hasZones ? "ACTIVE" : "NO LOAD"}</text>
                        </g>

                        <InteractiveGroup type="tank" x={tankX} y={tankY}>
                            {isClosed ? (
                                <g>
                                    <ellipse cx="0" cy="0" rx="25" ry="30" fill={tankColor} stroke="white" strokeWidth="2"/>
                                    <line x1="-25" y1="0" x2="25" y2="0" stroke="white" strokeWidth="1"/>
                                </g>
                            ) : (
                                <g>
                                    <path d="M -40 -30 L 40 -30 L 40 30 C 40 45 -40 45 -40 30 Z" fill="none" stroke="white" strokeWidth="2"/>
                                    <path d="M -35 30 C -35 40 35 40 35 30" fill="none" stroke="#0ea5e9" strokeWidth="2"/>
                                    <rect x="-35" y="10" width="70" height="25" fill="#0ea5e9" opacity="0.5"/>
                                </g>
                            )}
                            <text x="0" y={isClosed ? -40 : -45} textAnchor="middle" fill={tankColor} fontSize="10" fontWeight="bold">{tankLabel}</text>
                        </InteractiveGroup>
                    </svg>

                    {/* Live Data Strip (bottom bar) */}
                    <div className="border-t border-slate-700 bg-slate-800/60 grid grid-cols-4 divide-x divide-slate-700">
                        {[
                            { label: 'FI-101  Flow', val: designFlow > 0 ? `${designFlow.toFixed(1)} m³/h` : '-- m³/h', color: 'text-cyan-400' },
                            { label: 'TI-101  Supply', val: `${supplyTemp} °C`, color: 'text-emerald-400' },
                            { label: 'TI-102  Return', val: `${returnTemp} °C`, color: 'text-red-400' },
                            { label: 'PI-101  Head', val: pumpHead > 0 ? `${pumpHead.toFixed(1)} m` : '-- m', color: 'text-amber-400' },
                        ].map(({ label, val, color }) => (
                            <div key={label} className="text-center py-2">
                                <div className={`text-[9px] font-mono uppercase ${color}`}>{label}</div>
                                <div className="text-sm font-bold text-white font-mono">{val}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- H-Q Pump Curve Chart ---
        const PumpCurveChart = ({ designFlowM3h, designHeadM }) => {
            if (!window.Recharts) return null;
            const { ComposedChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ReferenceLine, ResponsiveContainer } = window.Recharts;

            const Q = designFlowM3h > 0 ? designFlowM3h : 10;
            const H = designHeadM > 0 ? designHeadM : 10;

            // Pump curve: H = H0 - Kp*Q²  (shutoff H0 ≈ 1.35× design head)
            const H0 = H * 1.35;
            const Qmax = Q * 1.6;
            const Kp = H0 / (Qmax * Qmax);
            // System curve (friction-only): Hs = Ks*Q²
            const Ks = H / (Q * Q);

            const N = 25;
            const data = Array.from({ length: N + 1 }, (_, i) => {
                const qi = (Qmax * 1.05 / N) * i;
                return {
                    Q: parseFloat(qi.toFixed(1)),
                    pump: parseFloat(Math.max(0, H0 - Kp * qi * qi).toFixed(1)),
                    system: parseFloat((Ks * qi * qi).toFixed(1)),
                };
            });

            // Custom dot — highlight operating point
            const OPDot = (props) => {
                const { cx, cy, payload } = props;
                if (Math.abs(payload.Q - Q) < Qmax / N * 0.7)
                    return <circle cx={cx} cy={cy} r={7} fill="#f59e0b" stroke="#fff" strokeWidth={2}/>;
                return null;
            };

            return (
                <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="p-4 bg-emerald-50/50 border-b border-emerald-100 flex items-center gap-3 flex-wrap">
                        <Icon name="Activity" size={18} className="text-emerald-600"/>
                        <h3 className="font-bold text-slate-800">泵浦特性曲線 H-Q Curve</h3>
                        <span className="ml-auto text-xs font-mono bg-amber-50 text-amber-700 px-2 py-0.5 rounded border border-amber-200 flex items-center gap-1">
                            <span className="w-2 h-2 rounded-full bg-amber-400 inline-block"></span>
                            OP: {Q.toFixed(1)} m³/h @ {H.toFixed(1)} m
                        </span>
                    </div>
                    <div className="p-4 pb-1" style={{height: 270}}>
                        <ResponsiveContainer width="100%" height="100%">
                            <ComposedChart data={data} margin={{top: 8, right: 24, left: 4, bottom: 24}}>
                                <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9"/>
                                <XAxis dataKey="Q"
                                    label={{value: 'Flow  Q  (m³/h)', position: 'insideBottom', offset: -12, fontSize: 11, fill: '#94a3b8'}}
                                    tick={{fontSize: 10, fill: '#94a3b8'}}/>
                                <YAxis
                                    label={{value: 'Head H (m)', angle: -90, position: 'insideLeft', offset: 16, fontSize: 11, fill: '#94a3b8'}}
                                    tick={{fontSize: 10, fill: '#94a3b8'}}/>
                                <Tooltip
                                    formatter={(v, name) => [`${v} m`, name === 'pump' ? '泵浦曲線' : '系統曲線']}
                                    labelFormatter={(l) => `Q = ${l} m³/h`}
                                    contentStyle={{fontSize: 11, borderRadius: 8, border: '1px solid #e2e8f0'}}/>
                                <Legend
                                    formatter={(v) => v === 'pump' ? '泵浦曲線 (Pump Curve)' : '系統曲線 (System Curve)'}
                                    wrapperStyle={{fontSize: 11, paddingTop: 2}}/>
                                <ReferenceLine x={Q}  stroke="#f59e0b" strokeDasharray="4 3" strokeWidth={1.5}
                                    label={{value: 'Qd', position: 'insideTopRight', fontSize: 9, fill: '#f59e0b'}}/>
                                <ReferenceLine y={H}  stroke="#f59e0b" strokeDasharray="4 3" strokeWidth={1.5}
                                    label={{value: 'Hd', position: 'insideTopRight', fontSize: 9, fill: '#f59e0b'}}/>
                                <Line type="monotone" dataKey="pump"   stroke="#10b981" strokeWidth={2.5} dot={<OPDot/>} activeDot={{r:4}} name="pump"/>
                                <Line type="monotone" dataKey="system" stroke="#3b82f6" strokeWidth={2} strokeDasharray="6 3" dot={false} activeDot={{r:4}} name="system"/>
                            </ComposedChart>
                        </ResponsiveContainer>
                    </div>
                    <div className="px-5 pb-3 text-[10px] text-slate-400 flex items-center gap-2">
                        <span className="w-3 h-0.5 bg-amber-400 inline-block rounded"></span>
                        <span>Operating Point (設計點)</span>
                        <span className="ml-auto">* 示意曲線，實際請廠商泵浦選型確認</span>
                    </div>
                </div>
            );
        };

        // --- Shared Components ---
        const Modal = ({ isOpen, onClose, title, children, wide=false }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm animate-fade-in p-4">
                    <div className={`bg-white rounded-xl shadow-2xl w-full border border-slate-200 overflow-hidden flex flex-col max-h-[90vh] ${wide ? 'max-w-4xl' : 'max-w-lg'}`}>
                        <div className="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50 shrink-0">
                            <h3 className="font-bold text-slate-800 flex items-center gap-2 text-lg">{title}</h3>
                            <button onClick={onClose} className="p-1 text-slate-400 hover:text-slate-600 rounded-full hover:bg-slate-200 transition">✕</button>
                        </div>
                        <div className="p-6 overflow-y-auto bg-slate-50">{children}</div>
                    </div>
                </div>
            );
        };

        const Card = React.forwardRef(({ children, className = "", highlighted }, ref) => (
            <div ref={ref} className={`bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden print:shadow-none print:border-slate-300 transition-all duration-500 flex flex-col ${className} ${highlighted ? 'card-highlight ring-2 ring-blue-500' : ''}`}>
                {children}
            </div>
        ));

        const SectionHeader = ({ icon, title, colorClass, subtitle }) => (
            <div className={`p-4 border-b flex justify-between items-center ${colorClass}`}>
                <div className="flex items-center gap-2">
                    <Icon name={icon} className="opacity-80"/>
                    <h3 className="font-bold text-slate-800 text-lg">{title}</h3>
                </div>
                {subtitle && <span className="text-sm opacity-70 font-mono hidden md:inline-block">{subtitle}</span>}
            </div>
        );

        // Updated InputGroup: Consistent spacing
        const InputGroup = ({ label, children, unit, className="", tooltip, error }) => (
            <div className={`mb-6 ${className}`}>
                <div className="flex items-center gap-1 mb-2">
                    <label className="text-base font-bold text-slate-600 uppercase tracking-wide">{label}</label>
                    {tooltip && <div className="group relative">
                        <Icon name="Info" size={16} className="text-slate-400 cursor-help"/>
                        <div className="absolute left-1/2 -translate-x-1/2 bottom-full mb-2 w-56 p-3 bg-slate-800 text-white text-xs rounded shadow-lg pointer-events-none opacity-0 group-hover:opacity-100 transition z-50">
                            {tooltip}
                        </div>
                    </div>}
                </div>
                <div className="relative">
                    {children}
                    {unit && <span className="absolute right-3 top-1/2 -translate-y-1/2 text-lg text-slate-400 font-medium pointer-events-none">{unit}</span>}
                </div>
                {error && <div className="text-xs text-red-500 mt-1 font-medium flex items-center gap-1"><Icon name="AlertCircle" size={12}/> {error}</div>}
            </div>
        );

        // --- Utils ---
        const getSuggestedDN = (flowM3h, velocityTarget = 2.0) => {
            if(flowM3h <= 0) return { dn: 0, vel: 0 };
            const flowM3s = flowM3h / 3600;
            const targetArea = flowM3s / velocityTarget;
            const targetDiaMM = Math.sqrt((4 * targetArea) / Math.PI) * 1000;
            const sizes = [15, 20, 25, 32, 40, 50, 65, 80, 100, 125, 150, 200, 250, 300, 350, 400, 500, 600];
            const chosenDN = sizes.find(s => s >= targetDiaMM) || sizes[sizes.length-1];
            const actualArea = (Math.PI * Math.pow(chosenDN/1000, 2)) / 4;
            const actualVel = flowM3s / actualArea;
            return { dn: chosenDN, vel: actualVel };
        };

        const getVaporPressure = (tempC) => 0.61078 * Math.exp((17.27 * tempC) / (tempC + 237.3));

        // --- Main App Component ---
        const PCWEstimator = () => {
            const [lang] = useState(getUrlLang());
            const t = TRANSLATIONS[lang];

            // --- State ---
            const [activeTab, setActiveTab] = useState('demand');
            
            // Feature State
            const [isLocked, setIsLocked] = useState(true);
            const [showUnlockModal, setShowUnlockModal] = useState(false);
            const [showRFQModal, setShowRFQModal] = useState(false);
            const [showHelpModal, setShowHelpModal] = useState(false);
            const [helpTab, setHelpTab] = useState('quick');
            const [passwordInput, setPasswordInput] = useState("");
            const [unlockError, setUnlockError] = useState(false);
            const [pendingAction, setPendingAction] = useState(null);
            
            // Interactive State
            const [highlightedCard, setHighlightedCard] = useState(null);
            const cardRefs = {
                phe: useRef(null),
                pump: useRef(null),
                filter: useRef(null),
                tank: useRef(null)
            };

            // Data State
            const defaultZones = [
                { id: '1', name: lang === 'en' ? 'L1 - Main Fab' : 'L1 - Main Fab (製程區)', flowRaw: 150, unit: 'm3h', deltaT: 5 },
                { id: '2', name: lang === 'en' ? 'L2 - Sub Fab' : 'L2 - Sub Fab (輔助區)', flowRaw: 80, unit: 'm3h', deltaT: 5 },
                { id: '3', name: lang === 'en' ? 'CUB - Utility' : 'CUB - Utility (廠務區)', flowRaw: 20000, unit: 'Lh', deltaT: 4 }, 
            ];

            const defaultParams = {
                fluidType: 'water',
                safetyFactor: 1.1,
                chillerMargin: 1.15,
                globalDeltaT: 5,
                simultaneity: 1.0,
                supplyTemp: 20,
            };

            const defaultEquipParams = {
                systemType: 'closed',
                specQuality: 'Industrial',
                specStandard: 'ASME',
                specRedundancy: 'N+1',
                // PHE Defaults updated from Alfa Laval Quote (SS304/0.5mm, 10bar)
                pheSecDeltaT: 7, pheApproach: 2, pheMaterial: 'SS304', pheThickness: '0.5', pheGasket: 'EPDM', phePressure: '10', pheSpare: 20,
                // Filter Defaults updated from FILTRAFINE Quote (High Flow, 40um, SS304)
                filterType: 'cartridge', filterMicron: 40, filterHousing: 'SS304', dpFilter: 50,
                pumpType: 'vertical', pumpMaterial: 'SUS304', pumpRPM: '3600', pumpVFD: 'Yes', pumpPowerSource: '380V/3Ø/60Hz', 
                motorEff: 'IE3', pumpEfficiency: 0.75, motorEfficiency: 0.90,
                staticHead: 2, suctionFrictionLoss: 0.5, staticLift: 0,
                dpPHE: 50, dpLoop: 250,
                tankStrategy: 'auto', tankMaterial: 'SS304', tankOrient: 'vertical', tankHoldupTime: 5, estSystemVol: 0,
            };

            const [zones, setZones] = useState(defaultZones);
            const [params, setParams] = useState(defaultParams);
            const [equipParams, setEquipParams] = useState(defaultEquipParams);
            const [isSettingsOpen, setIsSettingsOpen] = useState(true);

            // --- Persistence ---
            useEffect(() => {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if(parsed.zones) setZones(parsed.zones);
                        if(parsed.params) setParams({...defaultParams, ...parsed.params});
                        if(parsed.equipParams) setEquipParams({...defaultEquipParams, ...parsed.equipParams});
                    } catch(e) { console.error("Load Error", e); }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ zones, params, equipParams }));
            }, [zones, params, equipParams]);

            // --- Logic ---
            const fluidProp = FLUIDS[params.fluidType] || FLUIDS['water'];
            const heatFactor = (fluidProp.rho * fluidProp.cp) / 3600;
            const toM3h = (flow, unit) => unit === 'Lh' ? flow / 1000 : flow;
            const calculateZoneLoad = (flowM3h, dt) => heatFactor * flowM3h * dt;

            const systemKPI = useMemo(() => {
                let installedFlowM3h = 0;
                let installedLoadKW = 0;
                const detailedZones = zones.map(zone => {
                    const flowM3h = toM3h(zone.flowRaw, zone.unit);
                    const loadKW = calculateZoneLoad(flowM3h, zone.deltaT);
                    installedFlowM3h += flowM3h;
                    installedLoadKW += loadKW;
                    return { ...zone, flowM3h, loadKW };
                });
                const effectiveFlowM3h = installedFlowM3h * params.simultaneity;
                const effectiveLoadKW = installedLoadKW * params.simultaneity;
                const effectiveLoadRT = effectiveLoadKW / 3.517;
                const recChillerCapacityKW = effectiveLoadKW * params.chillerMargin;
                const recChillerCapacityRT = recChillerCapacityKW / 3.517;
                const recPumpFlowM3h = effectiveFlowM3h * params.safetyFactor;
                const designReturnTemp = params.supplyTemp + params.globalDeltaT;

                return { zones: detailedZones, installedFlowM3h, installedLoadKW, effectiveFlowM3h, effectiveLoadKW, effectiveLoadRT, recChillerCapacityKW, recChillerCapacityRT, recPumpFlowM3h, designReturnTemp };
            }, [zones, params, equipParams.systemType]);

            const equipKPI = useMemo(() => {
                const pheDutyKW = systemKPI.effectiveLoadKW;
                const pheSecFlowM3h = pheDutyKW > 0 ? pheDutyKW / (heatFactor * equipParams.pheSecDeltaT) : 0;
                const pheNozzle = getSuggestedDN(systemKPI.effectiveFlowM3h, 2.0);
                const pheSecNozzle = getSuggestedDN(pheSecFlowM3h, 2.0);
                
                // Total Friction Loss
                const totalDP_kPa = equipParams.dpFilter + equipParams.dpPHE + equipParams.dpLoop;
                // Friction Head in Meters
                const frictionHeadM = totalDP_kPa / (GRAVITY * (fluidProp.rho / 1000));
                // Total Pump Head = Friction + Static Lift
                const pumpHeadM = frictionHeadM + equipParams.staticLift;
                
                const pEff = equipParams.pumpEfficiency || 0.75;
                const mEff = equipParams.motorEfficiency || 0.90;
                const pumpEstShaftKW = (systemKPI.recPumpFlowM3h * pumpHeadM * (fluidProp.rho/1000) * GRAVITY) / (3600 * pEff * mEff); 
                const pumpSuction = getSuggestedDN(systemKPI.recPumpFlowM3h, 1.5);
                const pumpDischarge = getSuggestedDN(systemKPI.recPumpFlowM3h, 2.5);

                let npshA = 0, vaporPressureKpa = 0, npshStatus = "OK";
                if(equipParams.systemType === 'open') {
                    const patmM = 10.33; 
                    vaporPressureKpa = getVaporPressure(params.supplyTemp + 2); 
                    const vpHeadM = vaporPressureKpa / (GRAVITY * (fluidProp.rho/1000));
                    npshA = patmM + equipParams.staticHead - vpHeadM - equipParams.suctionFrictionLoss;
                    if(npshA < 3) npshStatus = "Critical"; 
                    if(npshA < 1) npshStatus = "Fail";
                }

                let filterConfig = "", filterModel = "";
                const filterDN = pumpDischarge.dn;
                
                // --- Filter Logic Update (Ref: FILTRAFINE Quote) ---
                if (equipParams.filterType === 'bag') {
                    const bagsNeeded = Math.ceil(systemKPI.recPumpFlowM3h / 30);
                    filterConfig = `${bagsNeeded} ${t.generated.bags}`;
                    filterModel = `BF-${bagsNeeded} (Size 2)`;
                } else {
                    // Cartridge Logic (High Flow Priority)
                    // Vendor spec: 800 CMH / 16 pcs = 50 CMH/pc
                    const flowPerCartridge = 50; 
                    if(systemKPI.recPumpFlowM3h > 20) { // Use High Flow for > 20 m3/h
                        const roundsNeeded = Math.ceil(systemKPI.recPumpFlowM3h / flowPerCartridge);
                        // Ensure minimum 1
                        const finalRounds = Math.max(1, roundsNeeded);
                        // Housing Model approximation based on 16LHV series logic
                        const seriesName = finalRounds >= 12 ? "16LHV" : finalRounds >= 7 ? "12LHV" : "LHV";
                        filterConfig = `${finalRounds} ${t.generated.cartridges}`;
                        filterModel = `FILTRAFINE ${seriesName} Series (or equiv.) [${finalRounds}x 40"]`;
                    } else {
                        // Small flow standard cartridge
                        const roundsNeeded = Math.ceil(systemKPI.recPumpFlowM3h / 2);
                        filterConfig = `${roundsNeeded} ${t.generated.stdCartridges}`;
                        filterModel = `CF-${roundsNeeded} (40")`;
                    }
                }

                let reqTankVol = 0, tankDesc = "", estSystemWaterVol = 0;
                if (equipParams.systemType === 'closed') {
                    const volFactor = 0.015; 
                    estSystemWaterVol = equipParams.estSystemVol > 0 ? equipParams.estSystemVol : (systemKPI.installedLoadKW * volFactor);
                    reqTankVol = estSystemWaterVol * 0.05; 
                    tankDesc = t.equip.expTank;
                } else {
                    reqTankVol = (systemKPI.recPumpFlowM3h / 60) * equipParams.tankHoldupTime;
                    tankDesc = t.equip.recvTank;
                }

                return { 
                    pheDutyKW, pheSecFlowM3h, pheNozzle, pheSecNozzle,
                    totalDP_kPa, pumpHeadM, pumpSuction, pumpDischarge, pumpEstShaftKW,
                    npshA, npshStatus, vaporPressureKpa,
                    filterConfig, filterModel, filterDN,
                    reqTankVol, tankDesc, estSystemWaterVol 
                };
            }, [systemKPI, equipParams, params, fluidProp, lang]);

            // --- Handlers ---
            const addZone = () => setZones([...zones, { id: Math.random().toString(36).substr(2, 9), name: lang === 'en' ? 'New Zone' : '新區域 (New Zone)', flowRaw: 0, unit: 'm3h', deltaT: params.globalDeltaT }]);
            const removeZone = (id) => setZones(zones.filter(z => z.id !== id));
            const updateZone = (id, f, v) => setZones(zones.map(z => z.id === id ? { ...z, [f]: v } : z));

            // Interactive Navigation Logic
            const handleNavigate = (section) => {
                setActiveTab('equipment');
                // Allow DOM to update if switching tabs
                setTimeout(() => {
                    const ref = cardRefs[section];
                    if (ref && ref.current) {
                        ref.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        setHighlightedCard(section);
                        setTimeout(() => setHighlightedCard(null), 2000); // Remove highlight after 2s
                    }
                }, 100);
            };

            // --- RFQ & Excel ---
            const generateRFQData = () => {
                return {
                    date: new Date().toISOString().split('T')[0],
                    general: {
                        fluid: t.fluids[params.fluidType],
                        quality: equipParams.specQuality,
                        standard: equipParams.specStandard,
                        redundancy: equipParams.specRedundancy
                    },
                    phe: {
                        duty: equipKPI.pheDutyKW.toFixed(0),
                        flowPri: systemKPI.effectiveFlowM3h.toFixed(1),
                        approach: equipParams.pheApproach,
                        material: equipParams.pheMaterial,
                        pressure: equipParams.phePressure
                    },
                    pump: {
                        type: equipParams.pumpType,
                        flow: systemKPI.recPumpFlowM3h.toFixed(1),
                        head: equipKPI.pumpHeadM.toFixed(1),
                        power: equipKPI.pumpEstShaftKW.toFixed(2),
                        npsh: equipParams.systemType === 'open' ? equipKPI.npshA.toFixed(1) : 'N/A'
                    },
                    filter: {
                        type: equipParams.filterType,
                        micron: equipParams.filterMicron,
                        model: equipKPI.filterModel
                    },
                    tank: {
                        type: equipKPI.tankDesc,
                        vol: equipKPI.reqTankVol.toFixed(2),
                        material: equipParams.tankMaterial
                    }
                };
            };

            const handleExportExcel = () => {
                const wb = XLSX.utils.book_new();
                const d = generateRFQData();
                const wsData = [
                    [t.rfq.title],
                    [t.rfq.date, d.date],
                    [],
                    [t.rfq.sec1, "", ""],
                    ["Fluid", d.general.fluid], ["Standard", d.general.standard], ["Redundancy", d.general.redundancy],
                    [],
                    [t.rfq.sec2, "", ""],
                    ["Capacity (kW)", d.phe.duty], ["Flow (m3/h)", d.phe.flowPri], ["Material", d.phe.material],
                    [],
                    [t.rfq.sec3, "", ""],
                    ["Type", d.pump.type], ["Flow", d.pump.flow], ["Head", d.pump.head],
                    [],
                    [t.rfq.sec4, "", ""],
                    ["Model", d.filter.model], ["Micron", d.filter.micron],
                    [],
                    [t.rfq.sec5, "", ""],
                    ["Type", d.tank.type], ["Volume", d.tank.vol]
                ];
                const ws = XLSX.utils.aoa_to_sheet(wsData);
                XLSX.utils.book_append_sheet(wb, ws, "PCW RFQ");
                XLSX.writeFile(wb, `PCW_RFQ_${d.date}.xlsx`);
            };

            const handleProtectedAction = (action) => {
                if (isLocked) {
                    setPendingAction(() => action);
                    setShowUnlockModal(true);
                } else {
                    action();
                }
            };

            const attemptUnlock = () => {
                if (passwordInput === UNLOCK_PASSWORD) {
                    setIsLocked(false);
                    setShowUnlockModal(false);
                    setPasswordInput("");
                    setUnlockError(false);
                    if (pendingAction) {
                        pendingAction();
                        setPendingAction(null);
                    }
                } else {
                    setUnlockError(true);
                }
            };

            return (
                <div className="min-h-screen pb-12 print:bg-white text-sm">
                    {/* Header */}
                    <div className="bg-slate-900 text-white shadow-xl border-b border-slate-800 sticky top-0 z-40 print:hidden">
                        <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 p-2 rounded-lg shadow-lg shadow-blue-500/20">
                                    <Icon name="Calculator" className="text-white" size={20}/>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold tracking-tight leading-tight">{t.appTitle} <span className="text-[10px] bg-emerald-500 text-white px-2 py-0.5 rounded-full ml-1">v6.9</span></h1>
                                    <p className="text-[10px] text-slate-400 font-medium">Semiconductor PCW System Engineering</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="bg-slate-800/50 p-1 rounded-lg border border-slate-700/50 flex gap-1">
                                    <button onClick={() => setActiveTab('demand')} className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all flex items-center gap-2 ${activeTab === 'demand' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'}`}><Icon name="Layout" size={14}/> {t.tabDemand}</button>
                                    <button onClick={() => setActiveTab('equipment')} className={`px-4 py-1.5 rounded-md text-xs font-bold transition-all flex items-center gap-2 ${activeTab === 'equipment' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'}`}><Icon name="Settings" size={14}/> {t.tabEquip}</button>
                                </div>
                                <div className="h-6 w-px bg-slate-700 mx-1"></div>
                                <button onClick={() => setShowRFQModal(true)} className="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 text-white px-3 py-1.5 rounded-md text-xs font-bold transition shadow-lg shadow-emerald-500/20"><Icon name="FileText" size={14}/> {t.btnRFQ}</button>
                                <button onClick={() => isLocked ? setShowUnlockModal(true) : setIsLocked(true)} className={`p-2 rounded-full transition ${isLocked ? 'text-amber-500' : 'text-emerald-500'}`} title={isLocked ? t.btnLocked : t.btnUnlocked}><Icon name={isLocked ? "Lock" : "Unlock"} size={18}/></button>
                                <button onClick={() => setShowHelpModal(true)} className="p-2 text-slate-400 hover:text-white transition" title="說明"><Icon name="Book" size={18}/></button>
                            </div>
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto p-4 md:p-6 print:p-0 print:w-full">
                        {/* Tab 1: Demand */}
                        {activeTab === 'demand' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-fade-in print:block">
                                <div className="lg:col-span-8 space-y-6">
                                    <Card>
                                        <button onClick={() => setIsSettingsOpen(!isSettingsOpen)} className="w-full flex justify-between items-center p-4 bg-slate-50 border-b border-slate-100">
                                            <span className="font-bold text-slate-700 flex items-center gap-2 text-base"><Icon name="Settings" size={18}/> {t.designBasis}</span>
                                            <Icon name="ChevronDown" size={18} className={`transition text-slate-400 ${isSettingsOpen ? 'rotate-180':''}`}/>
                                        </button>
                                        {isSettingsOpen && (
                                            <div className="p-5 grid grid-cols-1 sm:grid-cols-3 gap-6 bg-white">
                                                <div className="space-y-4">
                                                    <h4 className="text-sm font-bold text-blue-600 uppercase border-b border-blue-100 pb-1">負荷參數</h4>
                                                    <InputGroup label={t.inputs.fluid}>
                                                        <select value={params.fluidType} onChange={(e)=>setParams({...params, fluidType: e.target.value})} className="w-full border p-2 rounded text-xl outline-none focus:border-blue-500 bg-white">
                                                            {Object.entries(FLUIDS).map(([k, v]) => <option key={k} value={k}>{t.fluids[k]}</option>)}
                                                        </select>
                                                    </InputGroup>
                                                    <div className="grid grid-cols-2 gap-4">
                                                        <InputGroup label={t.inputs.simultaneity}><input type="number" step="0.05" value={params.simultaneity} onChange={(e)=>setParams({...params, simultaneity: parseFloat(e.target.value)||1})} className="w-full border p-2 rounded text-xl outline-none focus:border-blue-500"/></InputGroup>
                                                        <InputGroup label={t.inputs.safetyFactor}><input type="number" step="0.05" value={params.safetyFactor} onChange={(e)=>setParams({...params, safetyFactor: parseFloat(e.target.value)||1.1})} className="w-full border p-2 rounded text-xl outline-none focus:border-blue-500"/></InputGroup>
                                                    </div>
                                                </div>
                                                <div className="space-y-4">
                                                    <h4 className="text-sm font-bold text-emerald-600 uppercase border-b border-emerald-100 pb-1">溫度設定</h4>
                                                    <InputGroup label={t.inputs.supplyTemp} unit="°C"><input type="number" value={params.supplyTemp} onChange={(e)=>setParams({...params, supplyTemp: parseFloat(e.target.value)||20})} className="w-full border p-2 rounded text-xl outline-none focus:border-blue-500"/></InputGroup>
                                                    <InputGroup label={t.inputs.deltaT} unit="°C"><input type="number" step="0.5" value={params.globalDeltaT} onChange={(e)=>setParams({...params, globalDeltaT: parseFloat(e.target.value)||5})} className="w-full border p-2 rounded text-xl outline-none focus:border-blue-500"/></InputGroup>
                                                </div>
                                                <div className="space-y-4">
                                                    <h4 className="text-sm font-bold text-slate-400 uppercase border-b border-slate-100 pb-1">系統預覽</h4>
                                                    <div className="text-sm text-slate-500 space-y-2 pt-2">
                                                        <div className="flex justify-between"><span>{t.inputs.returnTemp}:</span> <b>{systemKPI.designReturnTemp}°C</b></div>
                                                        <div className="flex justify-between"><span>{t.inputs.density}:</span> <b>{fluidProp.rho} kg/m³</b></div>
                                                        <div className="flex justify-between"><span>{t.inputs.cp}:</span> <b>{fluidProp.cp} kJ/kg.K</b></div>
                                                        <div className="flex justify-between"><span>{t.inputs.heatFactor}:</span> <b>{heatFactor.toFixed(3)}</b></div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </Card>

                                    <Card className="min-h-[400px]">
                                        <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                            <h3 className="font-bold text-slate-800 flex items-center gap-2 text-base"><Icon name="FileText" className="text-blue-500"/> {t.zoneList}</h3>
                                            <button onClick={addZone} className="text-xs bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700 flex items-center gap-1"><Icon name="Plus" size={14}/> {t.btnAddZone}</button>
                                        </div>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead className="bg-slate-50 text-slate-500 text-xs uppercase font-semibold">
                                                    <tr>
                                                        <th className="px-4 py-3 w-10">#</th>
                                                        <th className="px-4 py-3">{t.table.name}</th>
                                                        <th className="px-4 py-3 w-28">{t.table.flow}</th>
                                                        <th className="px-4 py-3 w-20">{t.table.unit}</th>
                                                        <th className="px-4 py-3 w-20">ΔT</th>
                                                        <th className="px-4 py-3 text-right">{t.table.kw}</th>
                                                        <th className="px-4 py-3 w-8"></th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {systemKPI.zones.map((z, idx) => (
                                                        <tr key={z.id} className="hover:bg-blue-50/30">
                                                            <td className="px-4 py-3 text-center text-slate-400">{idx+1}</td>
                                                            <td className="px-4 py-3"><input value={z.name} onChange={(e)=>updateZone(z.id, 'name', e.target.value)} className="w-full bg-transparent outline-none text-slate-700 placeholder:text-slate-300 text-base"/></td>
                                                            <td className="px-4 py-3"><input type="number" value={z.flowRaw} onChange={(e)=>updateZone(z.id, 'flowRaw', parseFloat(e.target.value)||0)} className="w-full border rounded px-2 py-1 text-base outline-none text-slate-600 font-mono"/></td>
                                                            <td className="px-4 py-3"><select value={z.unit} onChange={(e)=>updateZone(z.id, 'unit', e.target.value)} className="bg-transparent text-sm font-bold text-slate-500 outline-none"><option value="m3h">m³/h</option><option value="Lh">L/h</option></select></td>
                                                            <td className="px-4 py-3"><input type="number" value={z.deltaT} onChange={(e)=>updateZone(z.id, 'deltaT', parseFloat(e.target.value)||0)} className="w-full text-center border-b border-dashed border-slate-300 outline-none bg-transparent font-mono text-base"/></td>
                                                            <td className="px-4 py-3 text-right font-mono font-bold text-blue-600 text-base">{z.loadKW.toFixed(1)}</td>
                                                            <td className="px-4 py-3 text-center"><button onClick={()=>removeZone(z.id)} className="text-slate-300 hover:text-red-500"><Icon name="Trash2" size={16}/></button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </Card>
                                </div>
                                <div className="lg:col-span-4 space-y-6">
                                    {/* Chiller Card with Load Bar */}
                                    <div className="bg-gradient-to-br from-blue-900 to-slate-900 text-white rounded-xl p-6 shadow-xl relative overflow-hidden ring-1 ring-white/10 print:border print:border-slate-300 print:text-black print:shadow-none print:bg-white">
                                        <div className="absolute -right-6 -top-6 text-slate-800"><Icon name="Snowflake" size={150} className="opacity-20"/></div>
                                        <h3 className="text-sm font-bold text-blue-300 uppercase tracking-widest mb-4 flex items-center gap-2">
                                            <Icon name="Thermometer" size={16}/> {t.systemLoad}
                                        </h3>
                                        <div className="mb-4">
                                            <div className="text-4xl font-bold tracking-tight text-white mb-1 print:text-black">{systemKPI.effectiveLoadKW.toLocaleString(undefined, {maximumFractionDigits: 0})} <span className="text-lg font-medium text-slate-400">kW</span></div>
                                            <div className="font-mono text-blue-200 text-sm print:text-slate-600">≈ {systemKPI.effectiveLoadRT.toFixed(1)} RT</div>
                                        </div>
                                        
                                        {/* Load Capacity Bar */}
                                        <div className="mb-4">
                                            <div className="flex justify-between text-[10px] text-slate-400 mb-1">
                                                <span>Capacity Usage</span>
                                                <span>{((systemKPI.effectiveLoadKW / (systemKPI.recChillerCapacityKW || 1)) * 100).toFixed(0)}% of Installed</span>
                                            </div>
                                            <div className="w-full h-1.5 bg-slate-700 rounded-full overflow-hidden">
                                                <div className="h-full bg-blue-400 rounded-full transition-all duration-500" style={{width: `${Math.min(((systemKPI.effectiveLoadKW / systemKPI.recChillerCapacityKW)*100), 100)}%`}}></div>
                                            </div>
                                        </div>

                                        <div className="pt-4 border-t border-white/10 print:border-slate-200">
                                            <div className="flex justify-between items-end">
                                                <span className="text-sm text-slate-400 print:text-slate-600">{t.recChiller}</span>
                                                <span className="font-mono text-xl font-bold text-blue-300 print:text-black">{systemKPI.recChillerCapacityRT.toFixed(0)} <span className="text-xs font-normal text-slate-500">RT</span></span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Pump Card */}
                                    <div className="bg-gradient-to-br from-emerald-900 to-slate-900 text-white rounded-xl p-6 shadow-xl relative overflow-hidden ring-1 ring-white/10 print:border print:border-slate-300 print:text-black print:shadow-none print:bg-white">
                                        <div className="absolute -right-6 -top-6 text-slate-800"><Icon name="Wind" size={150} className="opacity-20"/></div>
                                        <h3 className="text-sm font-bold text-emerald-300 uppercase tracking-widest mb-4 flex items-center gap-2">
                                            <Icon name="Activity" size={16}/> {t.circFlow}
                                        </h3>
                                        <div className="mb-4">
                                            <div className="text-4xl font-bold tracking-tight text-white mb-1 print:text-black">{systemKPI.recPumpFlowM3h.toFixed(1)} <span className="text-lg font-medium text-slate-400">m³/h</span></div>
                                            <div className="font-mono text-emerald-200 text-sm print:text-slate-600">Design Flow</div>
                                        </div>
                                        <div className="pt-4 border-t border-white/10 print:border-slate-200">
                                            <div className="flex justify-between items-end">
                                                <span className="text-sm text-slate-400 print:text-slate-600">{t.installedFlow}</span>
                                                <span className="font-mono text-xl font-bold text-emerald-300 print:text-black">{systemKPI.installedFlowM3h.toFixed(1)} <span className="text-xs font-normal text-slate-500">m³/h</span></span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Tab 2: Equipment (RFQ Ready) */}
                        {activeTab === 'equipment' && (
                            <div className="space-y-6 animate-slide-in">
                                
                                {/* Interactive P&ID with ISA instrument tags + live data */}
                                <PIDSchematic
                                    systemType={equipParams.systemType}
                                    hasZones={zones.length > 0}
                                    onNavigate={handleNavigate}
                                    lang={lang}
                                    supplyTemp={params.supplyTemp}
                                    returnTemp={systemKPI.designReturnTemp}
                                    designFlow={systemKPI.recPumpFlowM3h}
                                    pumpHead={equipKPI.pumpHeadM}
                                />

                                {/* H-Q Pump Curve */}
                                <PumpCurveChart
                                    designFlowM3h={systemKPI.recPumpFlowM3h}
                                    designHeadM={equipKPI.pumpHeadM}
                                />

                                {/* System Type Selector */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div onClick={() => setEquipParams({...equipParams, systemType: 'closed'})} className={`cursor-pointer rounded-xl border-2 p-5 transition-all relative ${equipParams.systemType === 'closed' ? 'border-indigo-600 bg-indigo-50/40' : 'border-slate-200 bg-white hover:border-slate-300'}`}>
                                        <div className="flex justify-between items-start mb-2"><div className={`p-2 rounded-lg ${equipParams.systemType === 'closed' ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}><Icon name="Shield" size={24}/></div>{equipParams.systemType === 'closed' && <Icon name="CheckCircle2" className="text-indigo-600" size={24}/>}</div>
                                        <h3 className={`text-lg font-bold mb-1 ${equipParams.systemType === 'closed' ? 'text-indigo-900' : 'text-slate-700'}`}>{t.sysTypeClosed}</h3>
                                        <p className="text-sm text-slate-500">{t.sysTypeClosedDesc}</p>
                                    </div>
                                    <div onClick={() => setEquipParams({...equipParams, systemType: 'open'})} className={`cursor-pointer rounded-xl border-2 p-5 transition-all relative ${equipParams.systemType === 'open' ? 'border-sky-500 bg-sky-50/40' : 'border-slate-200 bg-white hover:border-slate-300'}`}>
                                        <div className="flex justify-between items-start mb-2"><div className={`p-2 rounded-lg ${equipParams.systemType === 'open' ? 'bg-sky-500 text-white' : 'bg-slate-100 text-slate-400'}`}><Icon name="Droplets" size={24}/></div>{equipParams.systemType === 'open' && <Icon name="CheckCircle2" className="text-sky-500" size={24}/>}</div>
                                        <h3 className={`text-lg font-bold mb-1 ${equipParams.systemType === 'open' ? 'text-sky-900' : 'text-slate-700'}`}>{t.sysTypeOpen}</h3>
                                        <p className="text-sm text-slate-500">{t.sysTypeOpenDesc}</p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">
                                    {/* Pump Card (Ref for navigation) */}
                                    <Card ref={cardRefs.pump} highlighted={highlightedCard === 'pump'} className="border-t-4 border-t-emerald-500">
                                        <SectionHeader icon="Wind" title={t.equip.pump} colorClass="bg-emerald-50/50 border-emerald-100 text-emerald-900" subtitle={`H: ${equipKPI.pumpHeadM.toFixed(1)} m`}/>
                                        <div className="p-5 space-y-5 flex-1 flex flex-col">
                                            {/* Design Flow Display - Enlarged and Fixed */}
                                            <div className="mb-2 p-4 bg-emerald-50 border border-emerald-100 rounded-lg">
                                                <div className="flex justify-between items-center mb-1">
                                                    <span className="text-base font-bold text-emerald-800">{t.equip.designFlow}</span>
                                                    <span className="text-2xl font-mono font-bold text-emerald-700">{systemKPI.recPumpFlowM3h.toFixed(1)} m³/h</span>
                                                </div>
                                                {/* FIXED: Rounding error fix - now safely displays integer % */}
                                                <div className="text-sm text-emerald-600/70 text-right">包含安全係數 {((params.safetyFactor - 1) * 100).toFixed(0)}%</div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <InputGroup label={t.equip.totalHead} unit="kPa" tooltip="含 PHE + 迴路 + Filter 壓損"><input type="number" value={equipKPI.totalDP_kPa} disabled className="w-full border-b border-slate-200 bg-slate-50 text-slate-500 pb-1 font-mono text-xl"/></InputGroup>
                                                <InputGroup label={t.equip.rpm}><select value={equipParams.pumpRPM} onChange={(e)=>setEquipParams({...equipParams, pumpRPM: e.target.value})} className="w-full bg-transparent border-b border-slate-300 outline-none pb-1 text-xl"><option value="3600">3600</option><option value="1800">1800</option></select></InputGroup>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <InputGroup label={t.equip.dpLoop} unit="kPa"><input type="number" value={equipParams.dpLoop} onChange={(e)=>setEquipParams({...equipParams, dpLoop: parseFloat(e.target.value)||0})} className="w-full border-b border-slate-300 outline-none pb-1 font-mono text-xl"/></InputGroup>
                                                <InputGroup label={t.equip.dpPHE} unit="kPa"><input type="number" value={equipParams.dpPHE} onChange={(e)=>setEquipParams({...equipParams, dpPHE: parseFloat(e.target.value)||0})} className="w-full border-b border-slate-300 outline-none pb-1 font-mono text-xl"/></InputGroup>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                {/* NEW: Static Lift */}
                                                <InputGroup label={t.equip.staticLift} unit="m" tooltip="Static Lift (Hz): 垂直高程差"><input type="number" step="0.5" value={equipParams.staticLift} onChange={(e)=>setEquipParams({...equipParams, staticLift: parseFloat(e.target.value)||0})} className="w-full border-b border-slate-300 outline-none pb-1 font-mono text-xl"/></InputGroup>
                                                <InputGroup label={t.equip.dpFilter} unit="kPa" tooltip="已計入總壓損"><input type="number" value={equipParams.dpFilter} disabled className="w-full border-b border-slate-200 bg-slate-50 text-slate-400 pb-1 font-mono text-xl"/></InputGroup>
                                            </div>

                                            {equipParams.systemType === 'open' && (
                                                <div className={`p-3 rounded border text-sm ${equipKPI.npshStatus !== 'OK' ? 'bg-red-50 border-red-200 text-red-800' : 'bg-yellow-50 border-yellow-100 text-yellow-800'}`}>
                                                    <div className="font-bold mb-3 flex items-center gap-1"><Icon name="AlertCircle" size={14}/> NPSH Check</div>
                                                    <div className="grid grid-cols-2 gap-4 mb-2">
                                                        <div><span className="block text-sm text-slate-500 mb-1">{t.equip.staticHead}</span><input type="number" step="0.5" value={equipParams.staticHead} onChange={(e)=>setEquipParams({...equipParams, staticHead: parseFloat(e.target.value)})} className="w-full border rounded px-2 py-1 bg-white text-base"/></div>
                                                        <div><span className="block text-sm text-slate-500 mb-1">{t.equip.suctionLoss}</span><input type="number" step="0.1" value={equipParams.suctionFrictionLoss} onChange={(e)=>setEquipParams({...equipParams, suctionFrictionLoss: parseFloat(e.target.value)})} className="w-full border rounded px-2 py-1 bg-white text-base"/></div>
                                                    </div>
                                                    <div className="flex justify-between items-center border-t border-slate-200/20 pt-2 mt-2">
                                                        <span className="opacity-80">NPSHa:</span>
                                                        <span className="font-mono font-bold text-lg">{equipKPI.npshA.toFixed(2)}m ({equipKPI.npshStatus})</span>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="mt-auto bg-emerald-50 -mx-5 -mb-5 p-5 border-t border-emerald-100">
                                                <div className="flex justify-between mb-2">
                                                    <span className="text-base text-emerald-800 font-semibold">{t.equip.designHead}</span>
                                                    <span className="font-mono font-bold text-emerald-700 text-2xl">{equipKPI.pumpHeadM.toFixed(1)} m</span>
                                                </div>
                                                <div className="flex justify-between items-center">
                                                    <span className="text-base text-emerald-800 font-semibold">{t.equip.estPower}</span>
                                                    <span className="font-mono font-bold text-emerald-600 text-xl">{equipKPI.pumpEstShaftKW.toFixed(2)} kW</span>
                                                </div>
                                            </div>
                                        </div>
                                    </Card>

                                    {/* Filter Card */}
                                    <Card ref={cardRefs.filter} highlighted={highlightedCard === 'filter'} className="border-t-4 border-t-amber-500">
                                        <SectionHeader icon="Filter" title={t.equip.filter} colorClass="bg-amber-50/50 border-amber-100 text-amber-900"/>
                                        <div className="p-5 space-y-5 flex-1 flex flex-col">
                                            <InputGroup label={t.equip.filterType}><select value={equipParams.filterType} onChange={(e)=>setEquipParams({...equipParams, filterType: e.target.value})} className="w-full bg-transparent border-b border-slate-300 outline-none pb-1 text-xl"><option value="bag">{t.equip.bag}</option><option value="cartridge">{t.equip.cartridge}</option></select></InputGroup>
                                            
                                            {/* Spacer added for visual separation */}
                                            <div className="h-2"></div>

                                            <div className="grid grid-cols-2 gap-4">
                                                <InputGroup label={t.equip.micron}><input type="number" value={equipParams.filterMicron} onChange={(e)=>setEquipParams({...equipParams, filterMicron: parseFloat(e.target.value)||0})} className="w-full border-b border-slate-300 outline-none pb-1 font-mono text-xl"/></InputGroup>
                                                <InputGroup label={t.equip.initDP} unit="kPa"><input type="number" value={equipParams.dpFilter} onChange={(e)=>setEquipParams({...equipParams, dpFilter: parseFloat(e.target.value)||0})} className="w-full border-b border-slate-300 outline-none pb-1 font-mono text-xl"/></InputGroup>
                                            </div>
                                            <InputGroup label={t.equip.housingMat}><select value={equipParams.filterHousing} onChange={(e)=>setEquipParams({...equipParams, filterHousing: e.target.value})} className="w-full bg-transparent border-b border-slate-300 outline-none pb-1 text-xl"><option value="SS304">SS304</option><option value="SS316">SS316</option></select></InputGroup>
                                            
                                            <div className="mt-auto bg-amber-50 -mx-5 -mb-5 p-5 border-t border-amber-100">
                                                <div className="text-center">
                                                    <div className="text-base text-amber-800/70 mb-1 font-bold">{t.equip.recSpec}</div>
                                                    <div className="font-bold text-amber-800 text-lg mb-1">{equipKPI.filterConfig}</div>
                                                    <div className="text-base text-amber-600 font-mono mt-1 leading-tight px-2">{equipKPI.filterModel}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </Card>

                                    {/* PHE Card */}
                                    <Card ref={cardRefs.phe} highlighted={highlightedCard === 'phe'} className="border-t-4 border-t-blue-500">
                                        <SectionHeader icon="Activity" title={t.equip.phe} colorClass="bg-blue-50/50 border-blue-100 text-blue-900" subtitle={`Duty: ${equipKPI.pheDutyKW.toFixed(0)} kW`}/>
                                        <div className="p-5 space-y-5 flex-1 flex flex-col">
                                            <div className="grid grid-cols-2 gap-4">
                                                <InputGroup label={t.equip.secDeltaT} unit="°C"><input type="number" step="0.5" value={equipParams.pheSecDeltaT} onChange={(e)=>setEquipParams({...equipParams, pheSecDeltaT: parseFloat(e.target.value)||0})} className="w-full border-b border-slate-300 outline-none pb-1 font-mono text-xl"/></InputGroup>
                                                <InputGroup label={t.equip.approach} unit="°C"><input type="number" step="0.5" value={equipParams.pheApproach} onChange={(e)=>setEquipParams({...equipParams, pheApproach: parseFloat(e.target.value)||0})} className="w-full border-b border-slate-300 outline-none pb-1 font-mono text-xl"/></InputGroup>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <InputGroup label={t.equip.plateMat}><select value={equipParams.pheMaterial} onChange={(e)=>setEquipParams({...equipParams, pheMaterial: e.target.value})} className="w-full bg-transparent border-b border-slate-300 outline-none pb-1 text-xl"><option value="SS304">SS304</option><option value="SS316">SS316</option><option value="Ti">Ti</option></select></InputGroup>
                                                <InputGroup label={t.equip.pressure} unit="Bar"><select value={equipParams.phePressure} onChange={(e)=>setEquipParams({...equipParams, phePressure: e.target.value})} className="w-full bg-transparent border-b border-slate-300 outline-none pb-1 text-xl"><option value="10">10</option><option value="16">16</option></select></InputGroup>
                                            </div>
                                            
                                            <div className="mt-auto bg-blue-50 -mx-5 -mb-5 p-5 border-t border-blue-100">
                                                <div className="flex justify-between mb-2"><span className="text-base text-blue-800 font-semibold">{t.equip.recPipe}</span><span className={`font-mono font-bold text-xl ${equipKPI.pheNozzle.vel > 2.5 ? 'text-red-500':'text-blue-900'}`}>DN{equipKPI.pheNozzle.dn} <span className="text-sm font-normal">({equipKPI.pheNozzle.vel.toFixed(1)}m/s)</span></span></div>
                                                <div className="text-sm text-amber-600 mt-2 bg-amber-50 px-2 py-1 rounded border border-amber-200"><Icon name="AlertTriangle" size={14} className="inline mr-1"/> {t.equip.vendorCalc}</div>
                                            </div>
                                        </div>
                                    </Card>

                                    {/* Tank Card */}
                                    <Card ref={cardRefs.tank} highlighted={highlightedCard === 'tank'} className={`border-t-4 ${equipParams.systemType === 'closed' ? 'border-t-indigo-500' : 'border-t-sky-500'}`}>
                                        <SectionHeader icon="Box" title={equipKPI.tankDesc} colorClass={`${equipParams.systemType === 'closed' ? 'bg-indigo-50/50 border-indigo-100 text-indigo-900' : 'bg-sky-50/50 border-sky-100 text-sky-900'}`}/>
                                        <div className="p-5 space-y-5 flex-1 flex flex-col">
                                            <div className="grid grid-cols-2 gap-4">
                                                <InputGroup label={t.equip.tankMat}><select value={equipParams.tankMaterial} onChange={(e)=>setEquipParams({...equipParams, tankMaterial: e.target.value})} className="w-full bg-transparent border-b border-slate-300 outline-none pb-1 text-xl"><option value="SS304">SS304</option><option value="SS316">SS316</option><option value="PE">PE</option></select></InputGroup>
                                                <InputGroup label={t.equip.installType}><select value={equipParams.tankOrient} onChange={(e)=>setEquipParams({...equipParams, tankOrient: e.target.value})} className="w-full bg-transparent border-b border-slate-300 outline-none pb-1 text-xl"><option value="vertical">{t.equip.vertical}</option><option value="horizontal">{t.equip.horizontal}</option></select></InputGroup>
                                            </div>
                                            {equipParams.systemType === 'closed' ? (
                                                <InputGroup label={t.equip.sysVol}><input type="number" step="0.1" value={equipKPI.estSystemWaterVol.toFixed(1)} onChange={(e)=>setEquipParams({...equipParams, estSystemVol: parseFloat(e.target.value)||0})} className="w-full border-b border-slate-300 outline-none pb-1 font-mono text-xl"/></InputGroup>
                                            ) : (
                                                <InputGroup label={t.equip.holdup}><input type="number" value={equipParams.tankHoldupTime} onChange={(e)=>setEquipParams({...equipParams, tankHoldupTime: parseFloat(e.target.value)||0})} className="w-full border-b border-slate-300 outline-none pb-1 font-mono text-xl"/></InputGroup>
                                            )}
                                            
                                            <div className="mt-auto bg-slate-50 -mx-5 -mb-5 p-5 border-t border-slate-100">
                                                <div className="flex justify-between items-center">
                                                    <span className="text-base text-slate-600 font-bold">{t.equip.reqVol}</span>
                                                    <span className="font-mono font-bold text-2xl text-slate-800">{equipKPI.reqTankVol.toFixed(2)} m³</span>
                                                </div>
                                            </div>
                                        </div>
                                    </Card>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Pro RFQ Modal */}
                    <Modal isOpen={showRFQModal} onClose={() => setShowRFQModal(false)} title={t.rfq.title} wide>
                        <div className="bg-white text-slate-800 font-serif p-8 max-w-3xl mx-auto shadow-sm border border-slate-200 rfq-paper">
                            {/* Paper Header */}
                            <div className="border-b-2 border-slate-800 pb-4 mb-6 flex justify-between items-end">
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-900 tracking-tight">PCW SYSTEM SPECIFICATION</h1>
                                    <p className="text-sm text-slate-500 font-sans mt-1">Request for Quotation</p>
                                </div>
                                <div className="text-right text-xs text-slate-500 font-mono">
                                    <p>Date: {new Date().toISOString().split('T')[0]}</p>
                                    <p>Ref: PCW-EST-V6.9</p>
                                </div>
                            </div>

                            {/* Section: General */}
                            <div className="mb-6">
                                <h3 className="text-sm font-bold bg-slate-100 p-1 px-2 border-l-4 border-slate-500 uppercase tracking-wide mb-3">{t.rfq.sec1}</h3>
                                <div className="grid grid-cols-3 gap-4 text-xs">
                                    <div className="p-2 border border-slate-100"><span className="text-slate-400 block mb-1">Fluid</span><span className="font-semibold">{t.fluids[params.fluidType]}</span></div>
                                    <div className="p-2 border border-slate-100"><span className="text-slate-400 block mb-1">Water Quality</span><span className="font-semibold">{equipParams.specQuality}</span></div>
                                    <div className="p-2 border border-slate-100"><span className="text-slate-400 block mb-1">System Type</span><span className="font-semibold">{equipParams.systemType.toUpperCase()}</span></div>
                                </div>
                            </div>

                            {/* Section: Equipment Table */}
                            <div className="mb-8">
                                <h3 className="text-sm font-bold bg-slate-100 p-1 px-2 border-l-4 border-slate-500 uppercase tracking-wide mb-3">{t.rfq.sec2}</h3>
                                <table className="w-full text-xs border-collapse border border-slate-200">
                                    <thead>
                                        <tr className="bg-slate-50 text-left">
                                            <th className="border p-2 w-1/4">{t.rfq.item}</th>
                                            <th className="border p-2 w-1/2">{t.rfq.desc}</th>
                                            <th className="border p-2 w-1/4">{t.rfq.note}</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {/* PHE */}
                                        <tr>
                                            <td className="border p-2 font-bold" rowSpan="3">Plate Heat Exchanger</td>
                                            <td className="border p-2">Capacity: <b>{equipKPI.pheDutyKW.toFixed(0)} kW</b></td>
                                            <td className="border p-2 text-slate-500">Dual Source</td>
                                        </tr>
                                        <tr>
                                            <td className="border p-2">Primary Flow: {systemKPI.effectiveFlowM3h.toFixed(1)} m³/h</td>
                                            <td className="border p-2 text-slate-500">Approach: {equipParams.pheApproach}°C</td>
                                        </tr>
                                        <tr>
                                            <td className="border p-2">Material: {equipParams.pheMaterial} (Pressure: {equipParams.phePressure} bar)</td>
                                            <td className="border p-2"></td>
                                        </tr>
                                        
                                        {/* Pump */}
                                        <tr>
                                            <td className="border p-2 font-bold" rowSpan="3">Circulation Pump</td>
                                            <td className="border p-2">Flow: <b>{systemKPI.recPumpFlowM3h.toFixed(1)} m³/h</b> @ Head: <b>{equipKPI.pumpHeadM.toFixed(1)} m</b></td>
                                            <td className="border p-2 text-slate-500">{equipParams.pumpType}</td>
                                        </tr>
                                        <tr>
                                            <td className="border p-2">Motor: {equipParams.pumpPowerSource}, Eff: {equipParams.motorEff}</td>
                                            <td className="border p-2 text-slate-500">{equipParams.pumpRPM} RPM</td>
                                        </tr>
                                        <tr>
                                            <td className="border p-2">Est. Power: {equipKPI.pumpEstShaftKW.toFixed(2)} kW</td>
                                            <td className="border p-2 text-slate-500">Static Lift included</td>
                                        </tr>

                                        {/* Filter */}
                                        <tr>
                                            <td className="border p-2 font-bold">Liquid Filter</td>
                                            <td className="border p-2">{equipParams.filterType === 'bag' ? 'Bag' : 'High Flow Cartridge'} Type, {equipParams.filterMicron} micron</td>
                                            <td className="border p-2 text-slate-500">Model: {equipKPI.filterModel}</td>
                                        </tr>

                                        {/* Tank */}
                                        <tr>
                                            <td className="border p-2 font-bold">Tank</td>
                                            <td className="border p-2">Volume: <b>{equipKPI.reqTankVol.toFixed(2)} m³</b> ({equipKPI.tankDesc})</td>
                                            <td className="border p-2">{equipParams.tankMaterial}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            {/* Footer Signoff */}
                            <div className="mt-12 pt-8 border-t border-slate-200 grid grid-cols-2 gap-12">
                                <div>
                                    <div className="h-10 border-b border-slate-400 mb-2"></div>
                                    <p className="text-xs text-slate-500 uppercase">{t.rfq.prepared}</p>
                                </div>
                                <div>
                                    <div className="h-10 border-b border-slate-400 mb-2"></div>
                                    <p className="text-xs text-slate-500 uppercase">{t.rfq.approved}</p>
                                </div>
                            </div>
                        </div>

                        {/* Actions */}
                        <div className="flex justify-end gap-3 p-4 bg-slate-50 border-t border-slate-200">
                            <button onClick={() => setShowRFQModal(false)} className="px-4 py-2 text-slate-500 hover:bg-slate-200 rounded text-sm">{t.btnClose}</button>
                            <button onClick={() => handleProtectedAction(handleExportExcel)} className="px-6 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded shadow-sm text-sm font-bold flex items-center gap-2">
                                <Icon name="Table" size={16}/> {t.btnExport}
